# 2026-06-12: corrected — expanded from two controls to the codified FOUR (PKCE,
# Refresh Token Rotation, 30-day idle refresh-token TTL, refresh-token IP
# allowlist); deadline 2026-05-11 already in force; threshold is CAs/ECAs in use
# by MORE THAN two customer production orgs; enforcement is delisting and/or
# temporary/permanent suspension of interoperation.
- id: post-pkce-refresh-rotation-mandate
  requirement: Partner Connected Apps / External Client Apps in use by more than two customer production orgs must implement four mandatory OAuth controls — PKCE, Refresh Token Rotation, 30-day idle refresh-token TTL, and a refresh-token IP allowlist (deadline May 11, 2026, in force).
  details: >
    Codified at secure_code_ac_eca (Summer '26 guide; announced via partner
    news 2026-04-27 with the prior heads-up ~March 2026). Applicability: the
    Partner Application (a) includes or uses CAs/ECAs (including
    partner-provided ones) AND (b) is used in more than two customer
    production orgs. The four controls: (1) PKCE on all client types, public
    or confidential — irreversible once enabled; (2) Refresh Token Rotation —
    irreversible; the client must persist each newly issued refresh token,
    handle rejected-token errors, and handle parallel-refresh races; (3)
    "Limit Idle Refresh Token TTL to 30 Days" — idle TTL resets on use;
    (4) "Enforce Refresh Token IP Allowlist" — max 256 IP addresses across
    all ranges; localhost, Salesforce-org, and custom-URL-scheme callbacks
    are exempt (consistent with RFC 8252 loopback redirects). Self-attesting
    via "Review Controls" permanently locks the controls (only IP ranges
    stay editable) — test every integration BEFORE attesting. Non-compliance
    consequence: AppExchange de-listing and/or temporary or permanent
    suspension of the application's interoperation with Salesforce services;
    Salesforce reserves the right to verify adoption. Related platform
    shift: new Connected Apps can no longer be created as of Spring '26 —
    ECAs are the only forward path. Note: Salesforce imposed these
    mandatory controls mid-cycle with ~2 weeks' notice — treat this baseline
    as a living document.
  applies_to: [all]
  automation: partially
  automation_notes: The toolkit inventories Connected App/ECA OAuth settings and flags missing controls; org-count thresholds need the partner's install data; the Review Controls attestation is owner-run after integration testing.
  severity_if_missing: major
  sources:
    - url: https://partners.salesforce.com/pdx/s/pcnews/mandatory-security-updates-for-connected-apps-and-ecas-MCFBLDLDQ2TVDZFA22GLAMBVEZGY?language=en_US
      date: "2025-2026"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_ac_eca.htm
      date: "Spring '26 (doc v262.0)"
      kind: official
    - url: https://partners.salesforce.com/pdx/s/pcnews/mandatory-security-updates-for-connected-apps-and-ecas-MC4HLLE66DUFDSPBIC3X3HF6GMI4
