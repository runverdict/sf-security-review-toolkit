# 2026-06-12: sharpened — the two accounts verify PARTNER-side authorization
# ("the authorization implemented at your end"), through Agentforce.
- id: artifact-third-party-creds-two-test-users
  requirement: Provide third-party application/resource-server credentials integrated with the solution, and two user accounts so reviewers can test the authorization implemented at the PARTNER's end — that MCP tools return data only to authorized users through Agentforce.
  details: >
    Two distinct test users with different permission levels are how the
    reviewer verifies the authorization story end-to-end: the same tool
    call under each user, issued through Agentforce, must return only that
    user's authorized data. The burden sits with the partner because
    platform-side MCP auth is org-level. Identity model settled 2026-06-12
    (mcp-per-user-authz-mechanics): NO end-user identity reaches the MCP
    server at tool-call time, so what the two-user exercise demonstrates is
    Salesforce-side gating (permission sets / agent + tool access per user)
    plus the partner's tenant-level scoping — write the documented
    expected-results matrix in those terms and never promise per-end-user
    enforcement at the MCP layer.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: The toolkit generates the two-user authorization proof script and expected-results matrix; account creation and third-party credentials are owner-run.
