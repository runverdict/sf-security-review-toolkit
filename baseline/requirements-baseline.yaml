# ----------------------------------------------------------------------------
# secure-coding-violations — the codified secure_code_violation_* catalog from
# the ISVforce Guide (17 named pages, Summer '26). Each is a reviewer-enforced
# rule with a trigger pattern and an accepted remediation. This is the codified
# rulebook; the fail-* section above is the empirical ranking — they
# cross-reference. Section added 2026-06-12.
# ----------------------------------------------------------------------------

- id: violation-third-party-js-css-hosting
  requirement: Loading JavaScript or CSS from third-party endpoints/CDNs is a named violation — all scripts and styles must ship as static resources in the package.
  details: >
    Two codified pages (Load JavaScript Files from Third-Party Endpoints;
    Load Third-Party CSS in Lightning Components). Rationale: dynamically
    loaded external code can change without the package version ID changing
    (no notification to admins or the security team), and the external
    endpoint gains the ability to inject code into every subscriber org.
    Accepted remediation: save the third-party JS/CSS in static resources,
    add them to the package, and load via $Resource URLs
    (apex:includeScript / ltng:require); a raw <link> tag to an external
    stylesheet is itself the violation trigger.
  applies_to: [managed-package, canvas]
  automation: fully
  automation_notes: Markup/metadata scan for external script and link references; vendoring the libraries is mechanical.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_third_party_js.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_third_party_css.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-css-outside-components
  requirement: CSS that escapes component style isolation (notably absolute positioning) is a named violation — use component-scoped, relative positioning.
  details: >
    The platform treats each namespace as an isolated sandbox; CSS that
    breaches isolation lets one component steal clicks from another or
    interfere with its intended use. Flagged pattern: position: absolute
    (and fixed positioning per the Top-20 blog, where this is #14 with
    absolute positioning as "the top reason"). Accepted remediation:
    relative positioning and component-scoped CSS (.THIS selector in Aura).
  applies_to: [managed-package]
  automation: fully
  automation_notes: CSS scan for absolute/fixed positioning in component bundles.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_css_outside_components.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-js-in-salesforce-domain
  requirement: Running vendor JavaScript in the Salesforce origin (homepage components, web links, custom buttons, REQUIRESCRIPT) is a named violation — rebuild in Visualforce, Aura, or LWC.
  details: >
    Vendor JS is sandboxed in vendor-specific origins (Visualforce) or
    lockers (Lightning); any attempt to break out and run code in the
    Salesforce origin is a violation. Specific detection pattern: a webLink
    with openType onClickJavaScript using REQUIRESCRIPT inside a managed
    package ("the vendor is injecting its code into a Salesforce origin").
    Accepted remediation: achieve the functionality with Visualforce, Aura,
    or Lightning Web Components, which run in the proper origin (e.g. a
    Visualforce button instead of object-embedded JavaScript). Classic-era
    equivalent is Top-20 #12.
  applies_to: [managed-package]
  automation: fully
  automation_notes: Metadata scan for onClickJavaScript webLinks/buttons and REQUIRESCRIPT usage.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_js_in_sforce_domain.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-secret-data-in-debug
  requirement: Logging secret data, sensitive information, passwords, keys, or stack traces in production is a named violation — redact or omit from logs.
  details: >
    Rationale: "the profiles permitted to view logs aren't the same profiles
    that are permitted to view secrets." Canonical flagged example: an Apex
    system.debug() of an HMAC authentication token. Accepted remediation:
    remove the debug statement from production code (or redact the value).
    Pair with the Agentforce-specific rule that prompts and agent responses
    must never be logged (agentforce-no-prompt-response-logging).
  applies_to: [managed-package, external-endpoint, mcp-server]
  automation: fully
  automation_notes: Pattern scan of debug/log statements cross-referenced against secret-bearing variables.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_secret_data_debug.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-insecure-storage-sensitive-data
  requirement: Storing sensitive data insecurely is a named violation — applies both to secrets stored on-platform and to customer data exported off-platform.
  details: >
    Explicit trigger scope: "Exporting customer data from the Salesforce
    platform" and "Storing secrets such as cryptographic keys, session ids,
    or passwords in the Salesforce Platform" — the off-platform leg makes
    this binding on external backends, not just package code. Canonical
    flagged example: a plaintext API-key text field on a custom object with
    public visibility. Accepted remediation: encrypt the secret and store
    the encryption key separately in a protected custom setting or protected
    custom metadata field. See fail-hardcoded-secrets for the four accepted
    platform storage mechanisms.
  applies_to: [managed-package, external-endpoint, mcp-server]
  automation: partially
  automation_notes: Metadata scan for unprotected secret-bearing fields/settings; off-platform storage review needs the audit engine's data-export dimension.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_storing_sensitive_data.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-known-vulnerable-software
  requirement: Using software with CVE-documented vulnerabilities related to your use cases is a named violation; patches must be tested and deployed as soon as available.
  details: >
    The bar is use-case relevance, not a numeric CVSS threshold. Reviewers
    expect the CVE database checked for all software the solution uses.
    CVEs unrelated to your use cases are documented as false positives with
    an explanation of why the vulnerable software is safe to use — the
    review team uses that documentation when deciding whether to approve it.
    Pairs with security-program element 4 (third-party library inventory
    with versions). Empirical rank: #2 in the official Top-20.
  applies_to: [all]
  automation: fully
  automation_notes: RetireJS / ecosystem-native dependency audit plus CVE-relevance triage; the FP justification is owner-confirmed.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_software_has_vulnerabilities.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-sample-code-in-production
  requirement: Shipping sample/copied code in the production solution is a named violation — sample code is an educational tool only.
  details: >
    "When building your production code, always write the code yourself.
    Avoid copying code from sources that you don't directly control."
    Rationale: direct reuse propagates vulnerabilities across many packages,
    intentionally or not on the sample author's part.
  applies_to: [managed-package]
  automation: partially
  automation_notes: Similarity detection against known sample-code corpora is heuristic; provenance review is human.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_sample_code.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-crud-fls-bypass
  requirement: Bypassing object-level and field-level access settings is a named violation — solutions must enforce the org's CRUD/FLS on standard and custom objects and degrade gracefully when access is restricted.
  details: >
    The accepted pattern gates DML/SOQL on describe checks (e.g.
    Schema.sObjectType.X.isCreateable()) or user-mode operations, surfacing
    an insufficient-access message when denied. Exactly five sanctioned
    bypass cases: (1) roll-up summaries/aggregates that don't directly
    expose data; (2) partner-maintained custom objects/fields (logs, system
    metadata) not directly user-accessible; (3) access from a
    high-privileged method non-admin users can't reach; (4) denying guest
    user access on communities/sites; (5) bespoke security policies on
    own-namespace custom objects — which MUST be documented in the
    submission. Everything else is a violation. See fail-crud-fls for the
    empirical #1 ranking and the API 67.0+ user-mode default.
  applies_to: [managed-package]
  automation: partially
  automation_notes: SFGE/PMD detect most violations; classifying a hit into the five sanctioned cases is human-confirmed and feeds the FP dossier.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_access_settings.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-sharing-rules-bypass
  requirement: Bypassing sharing rules in Apex is a named violation — Apex/Visualforce do not intrinsically respect profiles, FLS, or sharing, so explicit declarations are required per the codified rules.
  details: >
    "By default, an Apex class can read and update all data within an org"
    (at API <=66.0) — hence the declaration rules: with sharing on all
    global/@NamespaceAccessible entry points; with sharing or with inherited
    sharing on other controllers; with sharing on data-access classes (with
    inherited sharing only if nothing in the solution is without-sharing).
    Sanctioned exceptions: guest-user denial on sites/communities, and
    bespoke policies on own-namespace custom objects documented in the
    submission ("This exception doesn't apply to standard objects. The org
    admin solely owns the security policy for standard objects."). See
    fail-sharing-model for the API 67.0+ default shift.
  applies_to: [managed-package]
  automation: partially
  automation_notes: Static declaration scan is trivial; exception classification and FP-dossier justification are human work.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_sharing_rules.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-soql-injection
  requirement: SOQL injection via insecure query construction is a named violation — bind variables and input sanitation are the accepted remediations.
  details: >
    Apex SOQL injections enable privilege elevation because queries
    historically don't respect user permissions. Two codified injection
    types with distinct remediations: user-supplied object/field names need
    a Schema.getGlobalDescribe() allowlist plus isAccessible() checks;
    user-supplied WHERE-clause input needs bind variables
    (String.escapeSingleQuotes() only as a limited fallback for simple
    string comparisons, combined with other methods). Hard boundary: users
    may only supply object names, field names, and WHERE-clause inputs —
    never any other query portion; avoid executing user-generated queries in
    Apex at all (use the REST/SOAP APIs, which make SOQL calls safely).
  applies_to: [managed-package]
  automation: fully
  automation_notes: Scanner rules plus the audit engine's injection dimension; data-flow confirmation per finding.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_soql_injection.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-csrf-page-instantiation
  requirement: CSRF via state change or DML executed on page/component instantiation is a named violation — platform CSRF protection covers form requests and user-action DML only.
  details: >
    The platform protects form requests and user-action-triggered DML, but
    "state change or DML operations triggered on page instantiation execute
    before the rest of the page loads, and they bypass the platform's
    default CSRF protection." Vulnerable contexts: Visualforce page action
    attribute, constructors, LWC/Aura init handlers. Accepted remediations:
    Visualforce — set confirmationTokenRequired=true (GET requests then
    require a CSRF token in the URL; the default is false); Lightning/LWC —
    never perform state change/DML during component instantiation; trigger
    it from an explicit user action. For non-Salesforce APIs, the Top-20
    blog prescribes custom CSRF tokens (see endpoint-csrf-protection).
  applies_to: [managed-package]
  automation: fully
  automation_notes: Static scan for DML reachable from page actions/constructors/init handlers; confirmationTokenRequired metadata check.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_request_forgery.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-open-redirects
  requirement: Open redirects (dynamic redirects to user-controlled parameter values without validation) are a named violation.
  details: >
    Exploited for phishing. Flagged pattern: a PageReference built from a
    request parameter (e.g. a 'redirect' query param) with
    setRedirect(true). The guide demonstrates hardcoded redirect targets as
    the accepted remediation and acknowledges "multiple strategies" (e.g.
    allowlisting validated destinations) without demonstrating them.
  applies_to: [managed-package, external-endpoint]
  automation: fully
  automation_notes: Static scan for parameter-derived redirect targets plus live redirect probes on external endpoints.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_open_redirects.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-lockerservice-disabled
  requirement: Lightning LockerService disabled is a named violation — new reviews and periodic re-reviews require components at API version 40.0 or higher.
  details: >
    Detection: the apiVersion field in the AuraDefinitionBundle metadata —
    Locker is disabled at <=39.0 and enforced at >=40.0 (Locker activated
    Summer '17). Verbatim load-bearing rule: "New AppExchange security
    reviews and periodic re-reviews require components to be version 40.0 or
    higher so that Locker is enabled." Also official-public proof that
    periodic re-reviews enforce current bars retroactively.
  applies_to: [managed-package]
  automation: fully
  automation_notes: Metadata XML scan of component API versions; trivially automatable.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_locker_disabled.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-insufficient-escaping-components
  requirement: Insufficient escaping in Lightning components is a named violation — the security boundary is the component bundle, and public/global attributes are assumed attacker-controlled unless sanitized.
  details: >
    "Each component in a bundle is responsible for sanitizing the input
    provided to it by parent components, apps, or in URL parameters. Public
    or global component attributes are assumed to contain attacker-
    controlled inputs unless sanitized by the component in an onInit
    handler." Failure leads to XSS or URL redirection. Flagged pattern:
    aura:unescapedHtml bound to an attacker-influenceable attribute; the
    accepted remediation is not using unescapedHtml when rendering such
    values.
  applies_to: [managed-package]
  automation: fully
  automation_notes: Markup scan for unescapedHtml/manual-DOM patterns bound to public/global attributes.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_escaping_in_components.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-async-code-in-components
  requirement: Referencing a component from setTimeout()/setInterval() outside the framework lifecycle is a named violation — scoped to legacy components below API v40.0.
  details: >
    Async timing manipulation is treated as an attack vector (app crash /
    unresponsive component). Accepted remediations: wrap in $A.getCallback()
    and check component.isValid() before executing, or batch actions via
    $A.enqueueAction(). Explicit scope note: "This vulnerability doesn't
    apply to components created against the Summer '17 release (API v40.0)
    or later" — combined with the Locker >=40.0 requirement, this finding
    should be unreachable in a package that already passes the Locker check;
    useful for scanner-finding triage.
  applies_to: [managed-package]
  automation: fully
  automation_notes: Static scan for setTimeout/setInterval component references in <40.0 bundles; auto-deprioritized when all bundles are >=40.0.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_asynchronous_components.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: violation-secure-communication
  requirement: The solution must be reachable exclusively over secure protocols (HTTPS/SFTP) with secure TLS versions, weak ciphers disabled, long keys, HTTP-to-HTTPS redirects, and HSTS; HTTP and FTP are disallowed.
  details: >
    This is the codified transport-security gate in the public guide — and
    it is QUALITATIVE: "Use secure versions of TLS, disable weak ciphers,
    generate long keys, and redirect incoming requests that use HTTP to
    HTTPS"; "To prevent man-in-the-middle downgrade attacks, use HTTP
    strict transport security (HSTS)". No SSL Labs letter grade appears
    anywhere in the guide (see endpoint-ssl-labs-a-grade for the
    grade-as-guidance nuance). Plain-HTTP endpoints are an outright failure
    (Top-20 #17).
  applies_to: [all]
  automation: fully
  automation_notes: Live TLS/protocol/header inspection per endpoint plus codebase scan for http:// and ftp:// references.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_communication.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_prevent_violations.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-20: the two default PMD AppExchange rules a coverage audit found we
# named in the scanner family but did not PREDICT as their own violation class —
# so a partner running this toolkit then the real review would get a Code
# Analyzer hit we never anticipated (the "no-surprises" failure the Checkmarx-
# prediction exists to prevent). Both rule names + tiers verified against the
# official PMD AppExchange rules reference 2026-06-20.
- id: violation-feature-management-change-protection
  requirement: Calling FeatureManagement.changeProtection in packaged Apex is a named violation — a Critical PMD AppExchange rule (AvoidFeatureManagementChangeProtection).
  details: >
    FeatureManagement.changeProtection(name, type, value) flips whether a
    packaged Feature Parameter (or the custom permission gating a feature) is
    "Protected" or "Unprotected" in the subscriber org. A package path that
    unprotects a license-gated feature — especially one reachable from a
    subscriber-invocable entry point — is license-gate / entitlement
    tampering: the subscriber (or an attacker who reaches that path) turns on
    capability they did not license, or escalates privilege against the
    package's own licensing model. The Code Analyzer AppExchange rule
    AvoidFeatureManagementChangeProtection flags every call at the CRITICAL
    tier because legitimate use is rare and confined — protection state is
    normally set once at package design time, not toggled at runtime. The safe
    posture: do not call changeProtection from packaged runtime code; manage
    Feature Parameter protection through the packaging tooling. Maps to this
    toolkit's admin-surface dimension (privileged feature gating).
  applies_to: [managed-package]
  automation: fully
  automation_notes: Surfaced by the Code Analyzer PMD AppExchange selector (--rule-selector AppExchange) at the Critical tier; predicted here so the toolkit names it before the scan does. Confirm the call is reachable from subscriber-invocable code to set final severity.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/platform/salesforce-code-analyzer/guide/rules-pmd-appexchange.html
      date: "2026-06"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-20"

- id: violation-getinstance-with-taint
  requirement: Custom Settings/Custom Metadata getInstance(userId/profileId) with attacker-influenceable input is a named violation — a Moderate PMD AppExchange rule (AvoidGetInstanceWithTaint).
  details: >
    Hierarchy Custom Settings (and Custom Metadata) expose
    getInstance(Id userOrProfileId), which returns the settings row resolved
    for THAT specific user or profile. When the Id is request-traceable
    (a record reference, a parameter, a field the caller controls), the caller
    reads another user's or profile's hierarchy-scoped configuration — an IDOR
    / cross-user read of settings that may carry feature flags, limits, or
    embedded secrets. The Code Analyzer AppExchange rule AvoidGetInstanceWithTaint
    flags getInstance(userId)/getInstance(profileId) at the MODERATE tier. The
    safe idiom is the no-argument getInstance() (resolves for the running user)
    or getOrgDefaults() (the org-level row) — never a caller-supplied Id. Maps
    to this toolkit's apex-exposed-surface dimension (per-record / IDOR
    authorization on an exposed entry point).
  applies_to: [managed-package]
  automation: fully
  automation_notes: Surfaced by the Code Analyzer PMD AppExchange selector at the Moderate tier; predicted here so the toolkit names it. The verifier traces the Id argument to its origin — a server-side constant or the running user's own Id refutes; request-traceable input confirms.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/platform/salesforce-code-analyzer/guide/rules-pmd-appexchange.html
      date: "2026-06"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-20"

# ----------------------------------------------------------------------------
# agentforce — requirements for AppExchange-listed Agentforce solutions
# ("Secure Your Agentforce Solution" umbrella: custom actions + prompts) and
# the prompt-injection hardening pages. Binding for any packaged agent
# surface. Section added 2026-06-12.
# ----------------------------------------------------------------------------

- id: agentforce-action-classification
  requirement: All custom actions must be classified in the managed-package documentation along two axes — intended agent type (employee-facing vs service) and data sensitivity (public vs private).
  details: >
    Custom actions = autolaunched flows, invocable Apex classes, and prompt
    templates. Employee-facing agent: authenticated org users access the
    agent inside Salesforce. Service agent: the org owner's customers access
    it via channels like email/messaging. Public action: returns public data,
    appropriate for unauthenticated access. Private action: returns nonpublic
    data or performs sensitive operations (create/delete/alter records) — at
    minimum require user verification and grant access to verified users
    only. All public AND private custom actions must implement proper flow
    execution context plus CRUD, FLS, and record-level (with sharing) access
    checks.
  applies_to: [agentforce]
  automation: partially
  automation_notes: The toolkit inventories GenAiFunction/flow/invocable-Apex metadata and drafts the classification table; agent-type and sensitivity labels are owner-assigned.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_actions.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: agentforce-execution-identity-verifiedcustomerid
  requirement: Employee-facing agents execute actions as the prompting user; service agents execute as the agent identity — so service-agent flows/Apex must do their own authorization, and private service-agent actions must validate and scope ALL data via the VerifiedCustomerId context variable.
  details: >
    Private service-agent actions must, at minimum: source VerifiedCustomerId
    as a context-variable input (variable assignment in Agent Builder, NEVER
    user-controlled input); validate it is non-null and maps to a customer
    identity in the org (User or Contact under the out-of-the-box Customer
    Verification topic); associate all data accessed, altered, or returned
    with that identity; and prevent access to any data not associated with
    it. User verification is distinct from authentication (additional authn
    requirements are the customer's to configure). This is the official
    action-layer corroboration of the partner-side per-user-authorization
    expectation (see mcp-per-user-authz-mechanics).
  applies_to: [agentforce]
  automation: partially
  automation_notes: Static review verifies VerifiedCustomerId plumbing and scoping in flows/Apex; the authorization semantics need human confirmation against the data model.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_actions.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: agentforce-no-user-controlled-record-references
  requirement: Custom actions may NOT accept generic record references, record IDs, object names, or field names as user-controlled input — disable user input for those fields.
  details: >
    Enforcement mechanics: disable "Collect data from user" in Setup for
    those inputs, and set "copilotAction:isUserInput": false in the action's
    schema metadata for any input containing record references/IDs, object
    names, or field names. Letting the LLM/user control these is the
    agent-era equivalent of IDOR.
  applies_to: [agentforce]
  automation: fully
  automation_notes: Metadata scan of action input schemas for isUserInput on record-reference-shaped inputs.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_actions.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: agentforce-confirmation-required-sensitive-actions
  requirement: Custom actions that alter customer org data or invoke sensitive operations (e.g. sending email on the user's behalf) must always prompt the user for confirmation — isConfirmationRequired=true in GenAiFunction metadata.
  details: >
    "Always have the agent prompt the user for confirmation before
    proceeding" — the user validates the planned action before execution,
    preventing excessive agency (OWASP LLM06:2025). Metadata:
    <isConfirmationRequired>true</isConfirmationRequired> on the
    GenAiFunction. The platform-native form of the human-in-the-loop-writes
    control (see mcpthreat-rate-limiting-hitl-writes).
  applies_to: [agentforce]
  automation: fully
  automation_notes: Metadata scan flags data-altering/sensitive actions lacking isConfirmationRequired.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_actions.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: agentforce-no-third-party-llm-in-package
  requirement: Integrations with third-party LLM services (OpenAI, Google named) are NOT allowed inside packaged Agentforce custom actions — platform prompt templates or the Models API are the only sanctioned generation paths; actions altering Einstein Trust Layer settings are also prohibited.
  details: >
    "Integrations with third-party LLM services, such as OpenAI and Google,
    aren't allowed. Use Agentforce's solutions instead." Scope: this bans
    in-package actions calling external LLM APIs directly; a generic
    external-service backend reached as a third-party integration is instead
    governed by the in-scope external-endpoint rules (Test Your Entire
    Solution). Sanctioned generation paths: prompt templates (invoked by
    custom action, Apex, or flow) or direct Models API invocation (Apex or
    REST). Restricted functionality: actions that alter a Salesforce org's
    Einstein Trust Layer settings are not allowed in managed packages.
  applies_to: [agentforce]
  automation: fully
  automation_notes: Callout-inventory scan of packaged action code for LLM-provider endpoints and Trust-Layer-setting mutations.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_actions.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: agentforce-no-prompt-response-logging
  requirement: Never log Agentforce prompts or agent responses (no System.debug or other logging); use enhanced event logs in Agent Builder when logs are needed.
  details: >
    "Don't log Agentforce prompts or responses from the agent. Avoid using
    System.debug or other logging methods with prompts and generated
    responses. If logs are needed, enable enhanced event logs in Agent
    Builder." The agent-surface specialization of
    violation-secret-data-in-debug.
  applies_to: [agentforce]
  automation: fully
  automation_notes: Static scan for logging calls on prompt/response variables in action code paths.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_actions.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: agentforce-llm-output-untrusted
  requirement: Treat ALL LLM-generated content (prompt templates or Models API) as untrusted — validate format and value constraints before downstream use, and output-encode before display.
  details: >
    Before using generated content in downstream flow/Apex: enforce expected
    format and value constraints (length, character set, integer bounds);
    instruct the model to emit structured output (JSON) to ease parsing.
    Worked example: validate an LLM-returned record ID is a correctly sized
    Salesforce ID of allowlisted characters before it reaches DML/SOQL. For
    UI display, output-encode (sufficient escaping when embedding in an
    LWC). Anchored on OWASP LLM05:2025 Improper Output Handling.
  applies_to: [agentforce, mcp-server]
  automation: partially
  automation_notes: Static review of generated-content data flows for validation/encoding gaps; constraint adequacy is human judgment.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_actions.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: agentforce-prompt-hardening-design
  requirement: Every prompt must be hardened with four design elements — an LLM role, topic boundaries, expected output content/format (with schema for structured output), and explicit data-cannot-override-instructions language.
  details: >
    From "Design Security-Hardened Prompts": (1) a role for the LLM to
    assume; (2) boundaries delineating the content/topics it should and
    shouldn't process, with a generic-statement fallback for off-topic
    requests; (3) the expected output content and format — explicitly state
    what should and shouldn't appear in a response, and define the output
    schema for structured output; (4) where untrusted or user-input data is
    included, state that the data must not alter or override prompt
    instructions. The companion Prompt Injection Mitigation Resources page
    is a curated reading list (no binding MUSTs), anchored on OWASP
    LLM01:2025 Prompt Injection.
  applies_to: [agentforce, mcp-server]
  automation: partially
  automation_notes: Prompt-template lint for the four elements; adequacy of boundaries is human review plus adversarial testing.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_prompt_injection_harden.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_prompt_injection_resources.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: agentforce-prompt-input-validation
  requirement: Validate user-controlled data BEFORE including it in any prompt; if validation criteria are not met, the data must not be included.
  details: >
    Recommended criteria: an allowlist of acceptable characters or words
    (e.g. rejecting zero-width characters, reducing prompt-injection
    likelihood) and length limitations (limiting Do-Anything-Now /
    virtualization attack effectiveness). The prompt-side counterpart of
    mcpthreat-input-validation-schemas.
  applies_to: [agentforce, mcp-server]
  automation: partially
  automation_notes: Static review of prompt-assembly code paths for pre-inclusion validation; criteria fit is human judgment.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_prompt_injection_data.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: agentforce-prompt-enclosure-sandwiching
  requirement: Segment untrusted/user-controlled prompt data with a fresh secure-random-sequence enclosure per inference (static symbol delimiters are explicitly not best practice) and reinforce with prompt sandwiching.
  details: >
    Requirements from the official enclosure page: generate a random token
    set per untrusted-data enclosure, long enough to be unguessable, from a
    secure random source; use a NEW random sequence for each prompt
    inference; explain in the prompt instructions what the enclosure is and
    what it contains. Static delimiters (e.g. triple quotes) are called out
    as not a security best practice. Prompt sandwiching = repeat the
    instructions before AND after the untrusted data block.
  applies_to: [agentforce, mcp-server]
  automation: partially
  automation_notes: Static review of prompt assembly for per-inference random enclosures and sandwiching; entropy-source review is part of the crypto-internals dimension.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_prompt_injection_enclosure.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"
