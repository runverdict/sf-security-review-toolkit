# ============================================================================
# requirements-baseline.yaml — the AppExchange/AgentExchange security review
# requirement map as DATA (CONVENTIONS.md §4).
#
# Every requirement fact the toolkit relies on lives HERE, never hard-coded in
# skill prose. Skills read this file at run time and MUST warn the user when
# `last_verified` on the entries they use is older than 90 days — the review
# process changed three times in 18 months (Chimera retirement, Code Analyzer
# v5, AgentExchange).
#
# Entry schema (see CONVENTIONS.md §4 for field semantics):
#   id / requirement / details / applies_to / automation / automation_notes /
#   severity_if_missing / sources[] / verification / last_verified / conflicts
#
# Verification ladder:
#   web_research_unverified  -> found in public web research only (last_verified: null)
#   verified_primary         -> confirmed against a primary source (Partner
#                               Console, ISVforce Guide read directly, partner
#                               Slack official post, or empirical test)
#   conflicting              -> sources disagree; the `conflicts` field states
#                               every version. Skills surface these as "verify
#                               with your Partner Account Manager / partner
#                               Slack before relying on this" — never silently
#                               pick one.
#
# Source registry with last-checked dates: baseline/SOURCES.md
# Partner-gated sources are cited by name only — no verbatim prose, no
# template IDs, no Salesforce work-item numbers (CONVENTIONS.md §3).
# ============================================================================

# ----------------------------------------------------------------------------
# process — submission flow, fees, timelines, review mechanics
# ----------------------------------------------------------------------------

- id: process-submission-wizard
  requirement: Submission happens through the Security Review Wizard in the Partner Console (Technologies > Solutions > Start Review).
  details: >
    Multi-step wizard: (1) primary contact plus a backup distribution list,
    (2) technical details describing the solution, (3) architecture/usage
    documentation, API callout docs, scanner reports, and false-positive
    justifications, (4) test environment credentials for every component
    (Salesforce orgs, web apps, web services), (5) review and submit. Status
    is trackable afterward under Technologies > Check Status. The review
    officially begins when the partner starts saving information in the
    wizard; progress is tracked on the wizard's Overview page via a
    color-coded four-stage tracker (see process-review-stages).
  applies_to: [all]
  automation: partially
  automation_notes: >
    The toolkit can compile every upload (reports, docs, credentials manifest)
    into a submission bundle and pre-fill technical details from the scope
    manifest; the wizard itself is web-UI-driven and the human submits.
  severity_if_missing: blocker
  sources:
    - url: https://trailhead.salesforce.com/content/learn/modules/isv_security_review/isv_security_review_submit
      date: "2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_wizard.htm
      date: unknown
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_stages.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: process-checklist-builder
  requirement: A customized questionnaire/checklist is generated per solution architecture via the Checklist Builder.
  details: >
    The Checklist Builder asks which architecture elements the solution
    contains (managed package, external endpoints, Canvas, Lightning, mobile,
    externally hosted services, MCP server) and compiles the artifact list and
    questionnaire from that selection. There is no fixed question set. The
    toolkit's scope-detection phase mirrors this element-detection step so the
    generated readiness tracker matches what the wizard will ask for. The
    official name is the "Security Review Submission Requirements Checklist
    Builder", hosted in the Salesforce Partner Community / Partner Security
    Portal; both official and partner-gated sources confirm it generates the
    per-solution authoritative requirements list.
  applies_to: [all]
  automation: partially
  automation_notes: >
    Architecture-element detection from the codebase is fully automatable
    (sfdx-project.json, callout inventory, live MCP probe); the Checklist
    Builder itself is run by the partner in the Partner Console.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_prepare.htm
      date: unknown
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_required_materials.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12 (second pass): the AMOUNT is now corroborated by a second
# independent gated source (the partner fee/resubmission guide) — USD 999 per
# paid attempt promoted to verified_primary. Both gated captures show $1 rows
# adjacent to $999 rows; that is the legitimate FREE-solutions schedule (waiver
# arithmetic: $998 discount + $1 residual reconstructs the 999 base), which
# explains the earlier "corrupted capture / duplicate-row artifact" read. One
# facet stays open: MCP-listing applicability (neither source addresses it).
- id: process-review-fee
  requirement: Paid and freemium solutions pay USD 999 per security review attempt (reported as of 2026-06-12); free solutions pay a nominal USD 1 via a mandatory fee-waiver code; whether the schedule applies as-is to MCP-server (API-solution) listings remains the one open facet.
  details: >
    Amount (two independent login-gated partner sources, 2026-06): USD 999
    per attempt for paid/freemium solutions — initial review, retest of a
    remediated resubmission, Salesforce-initiated periodic re-reviews, AND
    partner-submitted re-reviews are all fee-bearing at that rate. Free
    solutions pay USD 1 per attempt: request a one-time fee-waiver code
    (after the listing's free pricing plan is approved) via a Partner
    Community support case; the code applies a USD 998 discount on the
    wizard's payment page (the official pages round this to "free
    distribution pays no fee"). Settled per-attempt semantics (official +
    gated, consistent): resubmitting a Returned submission is free; an
    FP-only resubmission of a Failed review is USD 0; a resubmission
    involving ANY code change — including mixed false-positive +
    true-positive responses — is a new paid attempt on a NEW
    package/API-solution version; a partner-run pen test does not waive the
    fee when Salesforce finds additional vulnerabilities. New versions that
    inherit a passed direct ancestor need no review or fee (see
    process-listing-readiness-inheritance). Special cases (gated fee guide):
    up to 4 same-namespace 2GP packages (1 base + 3 extensions) sold as a
    single solution ride one USD 999 attempt, though each package undergoes
    a separate review; converting a free solution to paid charges 999 ×
    the attempts it took to pass as free (for post-2023-02-28 submissions).
    Capture note: both gated sources interleave the paid (USD 999) and free
    (USD 1) schedules — the adjacent $1 rows are the free-solution table,
    not a corruption artifact. Open facet: no source states whether/how
    this schedule applies to MCP-server (API-solution) listings — confirm
    with your Partner Account Manager. Fees are perishable facts — confirm
    the current amount in the Partner Console at submission time.
  applies_to: [all]
  automation: manual_only
  automation_notes: Payment is initiated by the partner in the Partner Console; the toolkit only flags when a submission is fee-bearing.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_fees.htm
      date: "2023-2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_stages.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_how_it_works.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
    - url: "partner fee/resubmission guide (login-gated)"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — supersedes the old 10-14-week planning number and the
# "queue time plus separate review" reading; the figure is total elapsed time from
# a complete submission. Conflict resolved by partner-gated + official sources.
- id: process-review-timeline
  requirement: Plan on 6-8 weeks total from a complete submission for a first review; resubmission testing is materially faster (2-3 weeks).
  details: >
    The partner-gated current guidance (cite for planning) is 6-8 weeks TOTAL
    measured from receipt of a complete submission — not a queue period
    preceding a separate review window. The official public decomposition
    (cite for permanence): submission verification 1-2 weeks; first-time
    testing 3-4 weeks; resubmission testing 2-3 weeks — summing to 4-6 weeks
    typical for a clean first attempt, with the explicit caveat that
    submission completeness and total submission volume change actual
    duration (the official table excludes queue-wait/volume effects, which is
    why it under-counts the partner-gated total). A named queue sits between
    verification and testing. Submission quality directly impacts duration;
    there is no expedite path. Superseded readings partners may still
    encounter: "6-9 weeks queue plus 4-5 weeks review (~10-14 weeks)" and
    "6-9 weeks total".
  applies_to: [all]
  automation: manual_only
  automation_notes: Timeline is Salesforce-managed; the toolkit can only compute expected windows from the submission date and track status.
  severity_if_missing: informational
  sources:
    - url: https://trailhead.salesforce.com/content/learn/modules/isv_security_review/isv_security_review_submit
      date: "2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_how_it_works.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — this gate is now officially named: the "Submission
# Verification" stage run by Security Review Operations (1-2 weeks typical);
# a bounce sets review status "Returned" and resubmission is free.
- id: process-prequeue-validation
  requirement: The Submission Verification stage (Security Review Operations) checks materials completeness before testing; incomplete submissions are Returned without review, and resubmitting is free.
  details: >
    Security Review Operations verifies all required materials are present
    and valid (test org access works, credentials work, scanner reports
    attached, architecture doc and usage instructions present) before the
    submission enters the Product Security testing queue. Typical duration:
    1-2 weeks. A missing artifact — even valid test environment credentials
    or an external component — sets status "Returned" with feedback posted to
    the wizard's Overview page; processing pauses until the outstanding items
    arrive, costing queue position but no fee ("There's no charge to resubmit
    a returned submission"). A Returned can also happen later, during
    Testing, when an issue prevents full testing — equally free to resubmit.
  applies_to: [all]
  automation: partially
  automation_notes: >
    The toolkit's readiness tracker exists precisely to pass this gate on the
    first try: it verifies every artifact file exists and every credential in
    the manifest authenticates before the partner submits.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_stages.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_how_it_works.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — supersedes the support-case framing and the "resubmit
# (fee-bearing)" blanket: the official path is download the report from the wizard
# Overview page, then EITHER remediate code (new version + new PAID review) OR
# document false positives on the SAME failed review for FREE.
- id: process-failure-remediation-flow
  requirement: After a Failed review, download the report from the wizard Overview page, sweep the codebase for every instance of each cited issue class, then remediate (new version + new paid review) and/or document false positives (free resubmit on the same review).
  details: >
    A failure produces a detailed report (downloaded from the security review
    wizard's Overview page) listing vulnerabilities with descriptions and fix
    guidance. The review is explicitly black-box and time-limited: findings
    are representative examples, not an exhaustive list — partners must find
    and fix ALL instances of each issue class across the entire solution, not
    just the cited instances. Two remediation paths with different fee
    consequences: (a) code remediation requires creating another API-solution
    or managed-package version and starting a NEW review ("There's a fee to
    retest a remediated solution"); (b) false-positive-only responses are
    added to the SAME failed review and resubmitted — "There's no fee to have
    us evaluate false positives". Rerun the required scanners and attach
    updated reports with the resubmission. Technical office hours can
    pressure-test FP claims with Product Security before burning an attempt.
  applies_to: [all]
  automation: partially
  automation_notes: >
    The toolkit can ingest the failure report into the audit ledger, fan out
    finders for the same vulnerability class across the codebase, and draft
    the remediation summary; the resubmission is a human step.
  severity_if_missing: major
  sources:
    - url: https://trailhead.salesforce.com/content/learn/modules/isv_security_review/isv_security_review_fix
      date: "2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_stages.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_how_it_works.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

