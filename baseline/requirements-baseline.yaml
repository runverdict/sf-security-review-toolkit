# ----------------------------------------------------------------------------
# top-failure-causes — what actually fails reviews, ranked. The audit engine
# weights its dimensions by this section. NOTE the currency caveat in
# fail-taxonomy-currency before trusting the ranking for MCP-era submissions.
# ----------------------------------------------------------------------------

- id: fail-sessionid-egress
  requirement: Transmitting a Salesforce session ID off-platform is an automatic review failure.
  details: >
    Session identifiers obtained on-platform (Apex session retrieval,
    Visualforce session expressions, API session fields) must never appear in
    callouts, logs shipped externally, analytics, or any external system.
    There is no documentation-around-it path — this is the canonical
    auto-fail. Alternatives: OAuth flows, a dedicated integration user,
    Named Credentials.
  applies_to: [managed-package, external-endpoint, mcp-server]
  automation: fully
  automation_notes: Statically detectable with high confidence — session-retrieval patterns cross-referenced against outbound calls and logging; the PMD AppExchange rule set includes dedicated detectors.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.232.0.packagingGuide.meta/packagingGuide/security_review_example_failure_report.htm
      date: "2023-2025"
      kind: official
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: fail-crud-fls
  requirement: Missing CRUD/FLS enforcement is the #1 review failure cause "by a significant margin".
  details: >
    Every DML operation and SOQL query in Apex must enforce object- and
    field-level access for the running user (user-mode database operations,
    stripInaccessible, or explicit describe checks). Reviewers also want test
    evidence of graceful degradation when access is missing. Platform shift
    (verified Summer '26): at API version 67.0+, Apex runs in USER MODE by
    default (current user's object permissions and FLS enforced during
    execution; system mode was the default at <=66.0), and WITH
    SECURITY_ENFORCED is removed from SOQL — use WITH USER_MODE. Exactly five
    sanctioned bypass cases exist (roll-ups/aggregates that don't expose
    data; partner-internal logs/system metadata; high-privileged methods;
    guest-user denial on sites/communities; bespoke own-namespace policies —
    which must be documented in the submission). Ranked #1 failure cause "by
    a significant margin" in the official Top-20.
  applies_to: [managed-package]
  automation: partially
  automation_notes: SFGE and PMD rules detect most violations; demonstrating correct degradation behavior needs tests a human validates.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_access_settings.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.262.0.apexcode.meta/apexcode/apex_security_sharing_chapter.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — "omitted declarations default to without-sharing" is no
# longer true at API 67.0+: undeclared classes run WITH sharing by default
# (fall-through to without-sharing only at <=66.0). The codified declaration rules
# from the sharing-rules violation page are now spelled out.
- id: fail-sharing-model
  requirement: Apex classes must declare an explicit sharing model; the codified rules require with sharing on all global/@NamespaceAccessible entry points and on data-access classes.
  details: >
    Codified rules (Summer '26): declare `with sharing` on all global
    classes and classes containing @NamespaceAccessible methods (omitting
    the declaration counts the same as without sharing on these entry
    points); other controller entry points must be `with sharing` or `with
    inherited sharing`; classes that directly perform data access must be
    `with sharing` (`with inherited sharing` acceptable only if no class in
    the solution is without-sharing). Sanctioned exceptions: guest-user
    denial on sites/communities, and bespoke policies on own-namespace
    custom objects documented at submission (never standard objects).
    Deliberate without-sharing needs a documented justification in the FP
    dossier. Platform default shift: at API 67.0+ classes WITHOUT a
    declaration run in with-sharing mode; at <=66.0 the default can fall
    through to without-sharing — version-dependent triage. A top-tier
    failure cause (#3 in the official Top-20; Flows running in System Mode
    Without Sharing also fail).
  applies_to: [managed-package]
  automation: partially
  automation_notes: >
    Two phases: static detection of sharing declarations is trivial and fully
    automated; validating that each omission or deliberate without-sharing
    carries an FP-dossier justification is human work.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.apexcode.meta/apexcode/apex_classes_keywords_sharing.htm
      date: "2024-2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_sharing_rules.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.262.0.apexcode.meta/apexcode/apex_security_sharing_chapter.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: fail-soql-injection
  requirement: Dynamic SOQL/SQL built from unvalidated input is a recurring failure cause.
  details: >
    Use bind variables; where dynamic construction is unavoidable, typecast,
    allowlist, or escape. Applies equally to the external backend's SQL and
    to any query surface MCP tool parameters reach. Codified boundary rule
    (Summer '26): users may only ever supply object names, field names, and
    WHERE-clause inputs — never any other query portion; user-supplied
    object/field names require a schema allowlist plus isAccessible()
    checks; String.escapeSingleQuotes() is accepted only as a limited
    fallback for simple string comparisons. SOQL injection matters more in
    Apex because queries historically ran without respecting user
    permissions, enabling privilege elevation.
  applies_to: [managed-package, external-endpoint, mcp-server]
  automation: fully
  automation_notes: Pattern and data-flow detection via the scanners plus the audit engine's injection dimension.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.apexcode.meta/apexcode/pages_security_tips_soql_injection.htm
      date: "2024-2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_soql_injection.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: fail-xss
  requirement: XSS via unescaped output in Visualforce/Aura/LWC (and the external web client) is a recurring failure cause.
  details: >
    Escape-disabled output, unescaped-HTML components, manual-DOM LWC
    territory, and raw innerHTML are the platform-side patterns; the external
    web app carries the standard reflected/stored/DOM XSS bar. Codified for
    Lightning (Summer '26): the security boundary is the component bundle —
    public/global component attributes are assumed attacker-controlled
    unless sanitized in an onInit handler; aura:unescapedHtml bound to an
    attacker-influenceable attribute is the flagged pattern. Top-20 #8 names
    the sinks to avoid (eval(), DOMParser.parseFromString(), innerHTML,
    lwc:dom="manual").
  applies_to: [managed-package, external-endpoint]
  automation: partially
  automation_notes: Scanners catch the marked patterns; manual-DOM and framework-bypass cases need the audit engine's web-client dimension plus human review.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.apexcode.meta/apexcode/pages_security_tips_xss.htm
      date: "2024-2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_escaping_in_components.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: fail-hardcoded-secrets
  requirement: Hardcoded credentials anywhere in code, metadata, or config are a recurring failure cause.
  details: >
    Passwords, API keys, tokens in Apex, Visualforce/Aura attributes, HTML,
    static resources, or backend config. Hardcoded secrets fail even inside
    managed packages (code obscurity is explicitly not a defense). Four
    accepted platform storage mechanisms (Top-20 #4): protected custom
    metadata fields (partner-owned secrets), protected custom settings
    (subscriber-owned secrets), named credentials (accepted case-by-case),
    and encrypted custom objects with the encryption key stored in protected
    metadata/settings — the worked failure-report example shows exactly that
    bar ("apiKey__c field is encrypted ... encryption key ... stored in a
    protected custom setting"). Backend storage: vault or injected secrets,
    never the repo.
  applies_to: [managed-package, external-endpoint, mcp-server]
  automation: fully
  automation_notes: Scanner rules plus dedicated secret scanning; pair with the credential-storage artifact narrative.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_storing_sensitive_data.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_example_failure_report.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: fail-info-disclosure
  requirement: Information disclosure through verbose errors, stack traces, or sensitive data in logs is a recurring failure cause.
  details: >
    Negative-test the app (invalid input, denied access, forced exceptions)
    and read what comes back. Covers debug statements that log secrets and
    error pages that leak internals — see endpoint-error-hygiene-debug-off
    for the endpoint-side bar. Codified (Summer '26): "Don't log secret
    data, sensitive information, passwords, keys, or stack traces in
    production environments. Redact the data or omit it from the logs" —
    rationale: the profiles permitted to view logs aren't the profiles
    permitted to view secrets.
  applies_to: [managed-package, external-endpoint, mcp-server]
  automation: partially
  automation_notes: Pattern detection plus fuzzing; log-content review needs owner access.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_secret_data_debug.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-20: the fail-OPEN companion to fail-info-disclosure — the quiet half of
# error handling that had no baseline owner. Added with the
# error-handling-disclosure dimension (coverage-gap map P1.3).
- id: error-handling-fail-open
  requirement: Security decisions must fail CLOSED — an exception on an authorization, signature/HMAC, license, CSRF, or tenant-binding check must DENY, never fall through to allow.
  details: >
    The quiet companion to information disclosure (fail-info-disclosure): a
    security control that is real on the happy path but evaporates under an
    exception. A try/catch (except/rescue) wrapping a
    verify/authorize/checkPermission/hmac/signature/license/csrf check whose
    exceptional branch returns success, true, an empty-but-truthy value, or
    simply omits a re-raise/deny GRANTS access to a caller who induces the error
    (a malformed token, an oversized body, a forced upstream failure).
    CWE-636 (Not Failing Securely) / CWE-755 (Improper Handling of Exceptional
    Conditions); OWASP ASVS V7 error handling. The correct posture is
    default-deny: access requires the check to AFFIRMATIVELY succeed, never
    merely "not have failed yet." Owned by the error-handling-disclosure
    dimension; the cryptographic compare mechanics are crypto-internals, the
    missing-tenant-binding case is tenant-isolation.
  applies_to: [all]
  automation: partially
  automation_notes: The catch/except body around a security call is greppable, but confirming the exceptional branch grants (vs denies) and that the throwing input is attacker-reachable needs the code read in context.
  severity_if_missing: major
  sources:
    - url: https://cwe.mitre.org/data/definitions/636.html
      date: unknown
      kind: community
    - url: https://owasp.org/www-project-application-security-verification-standard/
      date: "2026"
      kind: community
  verification: web_research_unverified
  last_verified: null

- id: fail-js-not-static-resources
  requirement: JavaScript/CSS hotlinked from CDNs or inlined instead of served as static resources is a recurring platform-side failure cause.
  details: >
    All scripts and styles in package UI must load from static resources via
    the platform's include mechanisms. Inline script/link tags and external
    CDN references are flagged by the scanners and the CSP. Codified as two
    named violations (third-party JS endpoints, third-party CSS in Lightning
    components — see violation-third-party-js-css-hosting): dynamic loading
    lets externally managed code change without the package version
    changing, and grants the endpoint code-injection capability into every
    subscriber org.
  applies_to: [managed-package, canvas]
  automation: fully
  automation_notes: Markup scanning; remediation (vendoring libraries) is mechanical.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/blogs/2023/04/prepare-your-app-to-pass-the-appexchange-security-review
      date: "2023-04"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_third_party_js.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: fail-lightning-component-hygiene
  requirement: Lightning-specific hygiene findings recur — exposed message channels and legacy component API versions that disable the security architecture.
  details: >
    Lightning Message Channels should not be exposed without intent; Aura
    components below the API version where the component security
    architecture engages are auto-flagged. Both are scanner-detectable.
    Verified specifics (Summer '26): components must be API version >= 40.0
    so Locker is enabled (codified, enforced at new reviews AND periodic
    re-reviews); LMS channels need isExposed=false (the flag cannot be
    toggled on existing channels — use Managed Component Deletion, or
    document non-usage in the FP dossier, an officially accepted resolution
    path per Top-20 #15).
  applies_to: [managed-package]
  automation: fully
  automation_notes: Metadata XML checks; trivially automatable.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/docs/platform/salesforce-code-analyzer/guide/rules-pmd-appexchange.html
      date: "2025-2026"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_locker_disabled.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: fail-untestable-environment
  requirement: An un-testable review environment is a pure process-failure mode — credentials that fail, MFA prompts, broken setup steps, agents that do not route.
  details: >
    Distinct from any code vulnerability and entirely preventable. The
    toolkit's pre-submission validation exists to drive this failure class to
    zero: it logs in with every credential, replays the documented setup, and
    (for MCP) fires every example utterance before the partner submits.
    Verified consequences (Summer '26): an un-testable submission is set to
    "Returned" — in Submission Verification for missing materials (e.g.
    "valid test environment credentials or external components") or in
    Testing when an issue prevents full testing; free to resubmit but
    queue position is lost. "Applicants who don't test beforehand rarely
    pass and must resubmit."
  applies_to: [all]
  automation: fully
  automation_notes: End-to-end environment validation is automatable wherever credentials are available to the toolkit.
  severity_if_missing: blocker
  sources:
    - url: https://appnigma.ai/blogs/salesforce-security-review-guide-2026/
      date: "2026"
      kind: community
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_stages.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: fail-incomplete-questionnaire
  requirement: Incomplete or vague questionnaire and documentation answers cause rejections and extra review cycles.
  details: >
    Architecture questions answered thinly, undocumented N/A answers (see
    artifact-agentexchange-questionnaire-na-reasons), and architectural
    decisions asserted without justification all generate reviewer
    back-and-forth that costs weeks — formalized as the free-but-slow
    "Returned" status during Submission Verification.
  applies_to: [all]
  automation: partially
  automation_notes: The toolkit pre-fills from audit evidence and lints for empty/thin answers; final wording is owner-approved.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_submit_solution.htm
      date: "2024-2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_stages.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: fail-taxonomy-currency
  requirement: The published failure-cause ranking is pre-AgentExchange-era; MCP-specific failure data is not public.
  details: >
    The ranking and the circulating share-of-findings figures trace to a 2023
    official blog plus 2022-2024 community posts. Verified 2026-06-12: the
    Summer '26 Security Review Resources page still designates that 2023
    Top-20 blog as official preparation reading, so it remains the official
