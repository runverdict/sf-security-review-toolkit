# 2026-06-12: corrected — version conflict resolved at both tiers: the current
# official guide prescribes the v5-only invocation verbatim and the partner tier
# names "SFCA v5". The Apr-vs-Jul-2025 GA-date dispute stays unsettled but is not
# requirement-grade; do not assert a GA date.
- id: scan-code-analyzer-v5-required
  requirement: Managed packages must be scanned with Salesforce Code Analyzer (v5 tooling) and comprehensive scan results submitted in the Security Review Wizard; skipping Code Analyzer requires a clear written justification.
  details: >
    The Summer '26 guide prescribes the v5-generation invocation verbatim
    (the `sf code-analyzer` namespace and `--rule-selector` flags exist only
    in v5; v4 used `sf scanner run --category`), and the partner tier's tool
    list names "SFCA v5" — v5 is the current required tooling. Escape hatch
    verbatim: "If you're unable to use Code Analyzer, you must provide a
    clear justification for why you didn't run Code Analyzer on your code."
    A 100% clean scan is NOT required — fix everything fixable, re-scan, and
    document the remainder as false positives. The HTML report is attached in
    the Security Review Wizard. This scan is IN ADDITION to the Checkmarx
    Source Code Scanner scan for managed packages (see
    scan-checkmarx-partner-portal). No primary source states a v5 GA or
    mandatory-cutover date — do not assert one; check `code-analyzer
    --version` against the installed tool.
  applies_to: [managed-package]
  automation: fully
  automation_notes: >
    The toolkit installs the CLI, runs the scan, parses output, diffs against
    the audit ledger, and drafts the false-positive dossier rows. Fixing
    violations remains a human/code-change activity.
  severity_if_missing: blocker
  sources:
