# ----------------------------------------------------------------------------
# post-approval — staying listed
# ----------------------------------------------------------------------------

- id: post-periodic-rereview
  requirement: Approved solutions are periodically re-reviewed (typically every 6 months to 2 years, with notification), Salesforce can run random penetration tests at any time, and re-reviews enforce CURRENT bars retroactively.
  details: >
    Partner-tier wording: Salesforce "reserve[s] the right to conduct random
    security penetration tests on your application throughout the year",
    with a full periodic re-review normally every 6 months to 2 years
    (notification sent). Policy backing: Salesforce performs "security
    reviews of new Partner Applications and periodic security reviews of
    existing ones in accordance with the Partner Policies". Re-reviews
    enforce current standards retroactively (historical examples: S-Controls
    removal demanded at re-review; Lightning components must be API >= 40.0
    in "new AppExchange security reviews and periodic re-reviews"). Failing
    a re-review or letting the remediation period expire leads to manual
    delisting and review expiry (see process-listing-readiness-inheritance).
    Consequence: the live endpoints and artifact pack must stay continuously
    review-grade, not one-shot.
  applies_to: [all]
  automation: partially
  automation_notes: The stay-listed skill schedules artifact refresh and environment-liveness checks against the re-review horizon.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_periodic_reviews.htm
      date: "2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_locker_disabled.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
