    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: artifact-api-endpoints-spec
  requirement: Provide a Postman collection or OpenAPI-style description of all exposed API endpoints, plus valid tools/list output.
  details: >
    Machine-readable API documentation covering every exposed endpoint, and a
    captured tools/list response that parses and matches the live server.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Generate OpenAPI from code plus live introspection; capture tools/list during the probe; validate spec syntax.
  severity_if_missing: blocker
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: artifact-authn-authz-flow-doc
  requirement: Document the complete end-to-end authentication and authorization flow — token issuance, validation, and access controls.
  details: >
    From first credential to data access: how tokens are issued, how every
    request validates them, and how access-control decisions are made
    (scopes, roles, tenant binding). Sequence diagrams plus prose; this is
    the artifact the reviewer reads before attacking the auth surface.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: The toolkit drafts the document from code reading (issuance, middleware, access checks); a human confirms it matches reality.
  severity_if_missing: blocker
