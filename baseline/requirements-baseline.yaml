# 2026-06-12: corrected — the exact required command is now byte-verified from the
# official guide (adds the `sf` prefix the old entry was missing).
- id: scan-code-analyzer-invocation
  requirement: The required Code Analyzer invocation is `sf code-analyzer run --rule-selector AppExchange --rule-selector Recommended:Security --output-file CodeAnalyzerReport.html`.
  details: >
    Byte-verified from the Summer '26 guide. Run from the top-level directory
    of the package's code, with the code version matching the package
    submitted for review; the scan "can take a few hours" on complex
    codebases. Workflow: scan, fix issues, rescan with the same command,
    document false positives, upload the clean CodeAnalyzerReport.html plus
    FP documentation to the security-review submission. HTML is the
    submission format; CSV/JSON/JUnit are supported for machine parsing.
    Requires JDK 11+ for the PMD engine. If the CLI fails, consult the Code
    Analyzer documentation, then log an issue in the Code Analyzer GitHub
    repository. The 'Manage Listings' permission is needed to access the
    Partner Community/Console and the Security Review Wizard.
  applies_to: [managed-package]
  automation: fully
  automation_notes: Fully scriptable; the toolkit runs HTML for submission plus JSON for parsing in the same pass.
  severity_if_missing: blocker
  sources:
