# 2026-06-12: enriched — the official minimum structure (Location + Explanation per
# finding) and the Salesforce-provided template are now byte-verified.
- id: scan-false-positive-documentation
  requirement: Every unfixed scanner finding needs a written false-positive justification — minimum structure per flagged issue is Location (code location) plus Explanation (why it poses no vulnerability).
  details: >
    Official minimum (Summer '26): for each flagged issue include Location
    (the code location of the reported vulnerability) and Explanation (why
    the flagged code doesn't pose a vulnerability), plus clarifications of
    special use cases, circumstances, or exceptions. Salesforce provides a
    False Positive Documentation template (a login-gated Google Doc titled
    "False Positive Documentation <App Name>") — its body was captured
    2026-06-12 and its prescribed field structure is now verified; see
    artifact-fp-documentation-format. The official example pages use a
    Reported Vulnerability | Location | Response table, but "you can use
    whatever format suits the reporting of your information". Acceptable
    justification categories: nonexistent vulnerability, nonexploitable
    issue, or not required to support valid use cases. FP sources reviewers
    expect covered: Checkmarx, ZAP, Burp Suite, and prior Salesforce failure
    reports; the FP path explicitly covers dependency CVEs and
    Lightning-Message-Channel non-usage. Office-hours conversations are
    citable evidence (see process-office-hours-two-tracks). Complete FP
    documentation is repeatedly cited as the difference between passing and
    a bounce.
  applies_to: [all]
  automation: partially
  automation_notes: >
    The toolkit drafts the dossier rows from scanner output plus code reading
    (detected mitigations, validation logic); a human must confirm each
    justification — an agent cannot certify non-exploitability.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_document_responses.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
