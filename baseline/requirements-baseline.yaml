    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: artifact-credential-storage-attestation
  requirement: Document where sensitive material (access tokens, client credentials, API keys) is stored, and confirm no hardcoded secrets exist.
  details: >
    A storage narrative (what lives where: vault, env injection, encrypted
    columns, platform credential stores) plus an explicit no-hardcoded-secrets
    confirmation backed by a scan.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: Secret scanning and storage-location inventory are automatable from code; the confirmation statement is owner-signed because the scan cannot prove a negative.
  severity_if_missing: blocker
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: artifact-dast-scan-reports
  requirement: Submit DAST scan reports covering the MCP and identity endpoints, with findings and false positives documented.
  details: >
    Tool of the partner's choice (see dast-self-run-required). Scope must
