  verification: verified_primary
  last_verified: "2026-06-12"

- id: scan-code-analyzer-engines
  requirement: Code Analyzer v5 bundles multiple engines; select engines appropriate to the file types in the package.
  details: >
    Engines reported in v5: PMD (Apex/Visualforce, including the AppExchange
    rule set), ESLint v8/v9 (JavaScript/TypeScript/LWC), RetireJS (vulnerable
    JS dependencies), Salesforce Graph Engine (data-flow CRUD/FLS/SOQL
    analysis), Flow Scanner (Flows), and CPD (duplication). SFGE is
    computationally expensive (per-entry-point timeouts) — budget scan time
    accordingly. The Summer '26 guide pages confirm the engine inventory
    (PMD, PMD Copy Paste Detector, ESLint, RetireJS, Salesforce Graph
    Engine), note customized rules for LWC JavaScript, and state explicitly
    that Code Analyzer does NOT scan external endpoints.
  applies_to: [managed-package]
  automation: fully
  automation_notes: Engine selection by file type is automatable; the toolkit runs SFGE with timeout/retry management.
  severity_if_missing: informational
  sources:
    - url: https://developer.salesforce.com/docs/platform/salesforce-code-analyzer/guide/release-notes.html
      date: "2025-2026"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: scan-pmd-appexchange-rules
  requirement: The PMD AppExchange rule set carries the review-specific detectors, tiered Critical/High/Moderate.
  details: >
    ~37 rules (rule list re-confirmed against the official reference
    2026-06-20). Critical tier includes hardcoded-password, global
    install/uninstall-handler, FeatureManagement.changeProtection
    (see violation-feature-management-change-protection), S-Controls,
    javascript: URLs, setPassword, and Lightning-Locker-disabled detectors;
    High tier includes session-ID retrieval (Apex and Visualforce variants),
    hardcoded credentials in Aura/VF attributes, unescaped HTML, exposed
    Lightning Message Channels, and static-resource JS/CSS hosting; Moderate
    tier covers CRUD/FLS, HTTP security, getInstance(userId/profileId) taint
    (see violation-getinstance-with-taint), connected-app full scope, and
    further hardcoded-credential patterns. Activated by the AppExchange rule
    selector (--rule-selector AppExchange).
  applies_to: [managed-package]
  automation: fully
  automation_notes: Parse violations by rule name and severity; Critical/High findings feed the must-fix queue, Moderate feeds the review queue.
  severity_if_missing: informational
  sources:
    - url: https://developer.salesforce.com/docs/platform/salesforce-code-analyzer/guide/rules-pmd-appexchange.html
      date: "2026-06"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-20"

- id: scan-sfge-crud-fls-dataflow
  requirement: Run the Salesforce Graph Engine for data-flow CRUD/FLS analysis — it targets the single most common failure cause.
  details: >
    SFGE rules include ApexFlsViolation (CRUD/FLS detection on DML and SOQL),
    DatabaseOperationsMustUseWithSharing, MissingNullCheckOnSoqlVariable, and
    related data-flow checks. Because CRUD/FLS enforcement is the #1 review
    failure cause (see fail-crud-fls), SFGE output deserves first-priority
    triage even though the engine is slower than PMD. Officially recommended
    Summer '26: "To detect CRUD/FLS violations in your code, consider using a
    code scanner like Salesforce Code Analyzer's Salesforce Graph Engine."
  applies_to: [managed-package]
  automation: fully
  automation_notes: Invoke with the sfge engine selector; manage the per-entry-point timeout; rank findings ahead of other engines in the triage queue.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/docs/platform/salesforce-code-analyzer/guide/rules-sfge.html
      date: "2025-2026"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_access_settings.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — currency conflict resolved: the portal scanner is
# operational (confirmed at both tiers), the 3-runs-per-solution-version allotment
# is codified in the current official guide, and the scan is required IN ADDITION
# to Code Analyzer for package-bearing submissions (not for API-only/mobile).
- id: scan-checkmarx-partner-portal
  requirement: A Partner Security Portal Source Code Scanner (Checkmarx) report is required for any submission that includes a Salesforce package or component — in addition to Code Analyzer for managed packages; not required for mobile clients or API-only solutions.
  details: >
    Current official posture (Summer '26): the Source Code Scanner
    ("sometimes referred to as the Checkmarx scanner") on the Partner
    Security Portal scans Apex, Visualforce, and Lightning code. THREE runs
    per solution version are included in the security review fee — develop
    against free PMD (unlimited runs, but PMD results are NOT accepted with
    the submission) and reserve the three runs for the final report. The
    package version must be linked to an AppExchange listing before portal
    scanning; a paid Checkmarx license bypasses the three-scan limit and the
    linking requirement (and allows scanning unpackaged code). Portal access
    requires a Partner-Console-connected DevHub/packaging Developer Edition
    org plus the 'Author Apex' permission. For managed packages this scan is
    IN ADDITION to the mandatory Code Analyzer scan — they are not
    alternatives. Severity bar: all Checkmarx findings require attention
    (fix or documented false positive) EXCEPT those labeled "Code Quality".
    Does not cover external endpoints or non-platform code.
  applies_to: [managed-package]
  automation: partially
  automation_notes: >
    Portal login and scan initiation are partner actions; report download and
    parsing are automatable. The toolkit budgets the three included runs:
    develop on PMD, spend portal runs only on submission-grade reports.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_partner_security_portal_scanners.htm
