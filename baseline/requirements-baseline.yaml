# ----------------------------------------------------------------------------
# mcp-server — platform constraints for Agentforce-connected MCP servers
# (FAQ-level facts below are paraphrased from a partner-gated official post;
#  cited by name only per CONVENTIONS §3)
# ----------------------------------------------------------------------------

- id: mcp-transport-streamable-http-only
  requirement: The Agentforce MCP client speaks Streamable HTTP only; SSE-as-transport and STDIO servers are not supported.
  details: >
    The MCP server must be network-reachable from Salesforce infrastructure
    over HTTPS using the Streamable HTTP transport. A STDIO-only or
    legacy-SSE-only server cannot be connected.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Probe the live server's transport during scope detection; flag unsupported transports as a preflight failure.
  severity_if_missing: blocker
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
    - url: https://developer.salesforce.com/blogs/2025/06/introducing-mcp-support-across-salesforce
      date: "2025-06"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — a third mode exists since ~2026-03: Authorization Code
# flow via External Credential, SERVICE-ACCOUNT principal only (partner Slack MCP
# Q&A). Per-user auth remains unsupported (see mcp-per-user-authz-mechanics).
- id: mcp-auth-no-auth-or-client-credentials
  requirement: The Agentforce MCP client supports three auth modes — No Auth, OAuth 2.0 client_credentials, and (since ~2026-03) Authorization Code flow as a SERVICE-ACCOUNT principal via External Credential; none carries per-end-user identity.
  details: >
    client_credentials is an org-level service identity. The Authorization
    Code option authenticates the External Credential's principal
    interactively ONCE at configuration time — the resulting identity is
    still org-level service-account, not per-end-user — and requires the
    partner's authorization server to allow-list the Salesforce redirect URL
    (see auth-code-service-account-redirect-allowlist). Other auth types
    (API keys in headers, session auth, per-user flows) are not accepted;
    partners needing another flow are directed to raise it through the
    platform's MCP client feedback channel. The settled identity-model
    consequence (no per-user forwarding) lives in
    mcp-per-user-authz-mechanics.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Inspect the server's advertised auth and the registration configuration; flag unsupported flows at preflight.
  severity_if_missing: blocker
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
    - url: "partner Slack MCP Q&A (gated; official answers from the Salesforce MCP product team)"
      date: "2026-03/06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

# Added 2026-06-12 from the partner Slack MCP Q&A (gated).
- id: auth-code-service-account-redirect-allowlist
  requirement: When using Authorization Code flow via External Credential (service-account principal), the partner's OAuth authorization server must allow-list the Salesforce redirect URL used during principal authentication.
  details: >
    Auth Code flow is configured on the External Credential; when the admin
    manages the principal they are prompted to authenticate interactively,
    and that handshake returns through a Salesforce-side redirect URL. An
    authorization server enforcing exact-match redirect-URI validation
    (correct posture — keep it) rejects the handshake until that Salesforce
    redirect URL is registered for the client, which presents as a
    principal-authentication failure during setup, not as a server bug.
    Capture the exact URL from the External Credential setup at
    configuration time and treat it as a perishable platform value — never
    hardcode it from prose. The principal that authenticates is a service
    account (see mcp-auth-no-auth-or-client-credentials); scope its grant
    minimally, since every org-side tool call rides it.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: The toolkit can verify the authorization server's registered redirect URIs include the captured Salesforce URL; the External Credential principal setup itself is operator-run in the org.
  severity_if_missing: major
  sources:
    - url: "partner Slack MCP Q&A (gated; official answers from the Salesforce MCP product team)"
      date: "2026-03/06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: mcp-protocol-versions-supported
  requirement: Supported MCP protocol versions are 2024-11-05, 2025-03-26, and 2025-06-18.
  details: >
    The server must negotiate one of these three versions with the Agentforce
    client. The server's tools/list must return well-formed tool metadata
    (name, description, input schema) for the negotiated version.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Run the initialize handshake against the live server and validate the negotiated version and tools/list shape.
  severity_if_missing: blocker
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
    - url: https://developer.salesforce.com/blogs/2025/06/introducing-mcp-support-across-salesforce
      date: "2025-06"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: mcp-features-tools-only
  requirement: Only MCP Tools are supported by the Agentforce client; Prompt Templates and Resources are roadmapped, not live.
  details: >
    A server whose value depends on MCP resources or prompt templates will
    not surface those features through Agentforce. Scope the listing and the
    review artifacts to the tools surface.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Inventory the server's advertised capabilities and warn when resources/prompts carry functionality the listing description claims.
  severity_if_missing: major
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — conflict resolved: ALL AgentExchange listings (including
# MCP-server listings) must be installable managed packages; the packageable unit
# is the registration quartet (External Credential + External Service Registration
# + Named Credential + Permission Set); MCP Tool Actions are not packageable. On
# the broader AppExchange venue, package-less "Salesforce Platform API solutions"
# remain a reviewable listing class — a venue distinction, not a contradiction.
- id: mcp-listing-managed-package
  requirement: All AgentExchange listings, including MCP-server listings, must be installable managed packages; code-editor-oriented MCP servers are not AgentExchange material.
  details: >
    Partner-gated guidance is explicit ("AgentExchange listings must be
    installable Managed Packages" — the stated reason developer-tool MCP
    servers should not be published there). The packageable unit for an MCP
    listing is the MCP Server Registration quartet: External Credential,
    External Service Registration, Named Credential, and Permission Set —
    shipped inside a broader Agentforce extension package or as an
    independent managed package; MCP Tool Actions are NOT packageable (see
    mcp-tool-actions-not-packageable). Official corroboration: only
    Managed—Released packages are accepted for review (unmanaged/beta
    rejected outright). Venue nuance: the official AppExchange docs list
    three reviewable distribution classes — managed packages, Salesforce
    Platform API solutions, and Marketing Cloud Engagement API solutions —
    so package-less API-only solutions ARE listable on AppExchange
    generally; the managed-package mandate is specific to the AgentExchange
    venue. Practical consequence: an AgentExchange MCP listing runs BOTH the
    package-scanning track (for the thin registration package) and the
    external-endpoint/DAST track (for the server).
  applies_to: [mcp-server, agentforce]
  automation: partially
  automation_notes: Preflight verifies a promoted managed package exists (sf CLI) when the listing type requires one.
  severity_if_missing: blocker
  sources:
    - url: "MCP Client Partner Technical Guide (login-gated)"
      date: "2026-06"
      kind: partner_gated
    - url: https://agentexchange.salesforce.com/collections/agentforce-mcp
      date: "2026"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_required_materials.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: mcp-tool-actions-not-packageable
  requirement: MCP Tool Actions cannot be shipped inside the package — they are generated at registration time and must be configured manually in the subscriber org.
  details: >
    Tool actions are created when the MCP server is registered, then manually
    attached to agents and topics. If agent metadata is retrieved for
    packaging, MCP tool action references must be removed from the planner
    bundle before packaging or the package build breaks. Plan the test-org
    setup runbook accordingly: agent wiring is always a post-install step.
  applies_to: [mcp-server, agentforce]
  automation: partially
  automation_notes: The toolkit lints retrieved agent metadata for un-packageable MCP tool action references; the subscriber-org wiring is a guided manual step.
  severity_if_missing: major
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: mcp-registration-active-status-semantics
  requirement: A server registration showing Active before credentials are configured is expected — Active only means a Named Credential is associated.
  details: >
    Do not read registration status as a health check. Verify connectivity
    with a real initialize handshake and tool call, not the status field.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: The toolkit's live probe supersedes the status field.
  severity_if_missing: informational
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: mcp-tool-call-timeout
  requirement: Agentforce tool calls time out at one minute.
  details: >
    Any tool whose worst-case latency approaches 60 seconds will fail
    intermittently through Agentforce even though it works in other MCP
    clients. Audit long-running tools (report generation, bulk queries) and
    either bound their runtime or restructure into submit/poll pairs.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: The toolkit times each tool during live probing and flags anything above a conservative threshold.
  severity_if_missing: major
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: mcp-rendering-plain-text-markdown
  requirement: Agentforce renders tool responses as plain text with Markdown support — no Lightning or rich-component rendering.
  details: >
    Responses depending on HTML or custom rendering degrade. Matters for the
    review insofar as example utterances must produce legible results for the
    reviewer.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Lint tool outputs for HTML payloads during live probing.
  severity_if_missing: minor
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: mcp-agent-builder-beta-unsupported
  requirement: Build the review org's agent fresh with Agent Script — agents from the beta Agentforce Builder do not support MCP, and legacy-builder agents produce mixed results.
  details: >
    A test-org agent created in the wrong builder will fail to route
    utterances to MCP tools, producing an un-testable environment that
    bounces the review. Post-GA partner guidance for Security Review orgs:
    create a NEW agent using Agent Script (not the legacy builder) and add
    the MCP tools to it — older legacy-builder agents show mixed results;
    the planner service does not need updating for the new agent.
  applies_to: [mcp-server]
  automation: manual_only
  automation_notes: Encoded in the test-environment runbook; the toolkit cannot detect which builder created an agent remotely.
  severity_if_missing: major
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: mcp-tools-list-metadata-completeness
  requirement: Every exposed tool needs complete metadata — name, description, input schema (and output schema where supported).
  details: >
    The tools/list output is itself a submission artifact (see
    artifact-api-endpoints-spec). Missing descriptions or schemas read as an
    undocumented attack surface. For very large API surfaces, public guidance
    suggests consolidating behind a few facade tools rather than exposing
    hundreds of thin wrappers.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Validate tools/list against JSON Schema completeness rules; flag missing descriptions/schemas per tool.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2026/05/introducing-the-data-360-mcp-server-developer-preview
      date: "2026-05"
      kind: official
  verification: web_research_unverified
  last_verified: null

# 2026-06-12: corrected twice in one pass — the PURPOSE question settled first
# (the two test users verify partner-side authorization through Agentforce);
# then the MECHANICS question settled NEGATIVELY via the partner Slack MCP Q&A
# (gated): per-user auth does not exist on the Agentforce MCP client today, and
# no end-user identity reaches the server at tool-call time.
- id: mcp-per-user-authz-mechanics
  requirement: Per-user auth is NOT supported by the Agentforce MCP client (platform auth is org-level); no end-user identity is forwarded to the MCP server at tool-call time — so the two-test-user proof demonstrates Salesforce-side gating plus partner-side TENANT-level scoping, and documentation must never claim per-end-user MCP enforcement.
  details: >
    Settled negatively (partner Slack MCP Q&A, gated, 2026-06 — official
    answers from the Salesforce MCP product team): the client's auth modes
    are No-Auth, OAuth 2.0 client_credentials (an org-level service
    identity), and — added ~2026-03 — Authorization Code flow via External
    Credential for SERVICE-ACCOUNT use only, explicitly not per-user auth.
    Per-user auth is roadmapped post-GA with no committed date. NO end-user
    identity is forwarded to the MCP server at tool-call time. Consequence
    for the two-test-user requirement
    (artifact-third-party-creds-two-test-users): what the reviewers'
    two-user exercise demonstrates is (a) Salesforce-SIDE gating —
    permission sets, agent access, and tool access per user — and (b) the
    partner's TENANT-level scoping behind the org-level connection.
    AuthN/AuthZ documentation must state this identity model honestly and
    never claim per-end-user enforcement at the MCP layer — that over-claim
    is falsifiable by the reviewer in one probe. Architecture posture:
    design for tenant-level context now and adopt native per-user when the
    platform ships it; do not build an intermediary to fake per-user today.
    The earlier apparent conflict is resolved as a product-surface
    distinction: the public hosted-MCP-servers docs' per-user OAuth+PKCE
    framing describes Salesforce-HOSTED servers, not the Agentforce client
    connecting to partner servers. Official action-layer corroboration:
    employee-facing agents execute as the prompting user, service agents as
    the agent identity with their own authorization burden
    (VerifiedCustomerId scoping for private actions). Do NOT confuse any of
    this with the >2-customer-production-orgs CA/ECA threshold — a distinct
    scoping rule.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: The toolkit generates the two-user proof script, documents the tenant-binding mechanism from code reading, and lints generated AuthN/AuthZ prose for per-end-user over-claims.
  severity_if_missing: blocker
  sources:
    - url: "MCP Client Partner Technical Guide (login-gated)"
      date: "2026-06"
      kind: partner_gated
    - url: "partner Slack MCP Q&A (gated; official answers from the Salesforce MCP product team)"
      date: "2026-03/06"
      kind: partner_gated
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_actions.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/platform/hosted-mcp-servers/guide/hosted-mcp-servers-overview.html
      date: "2026"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# ----------------------------------------------------------------------------
# mcp-threat-model — MCP-spec security requirements and the 2025-26 threat
# landscape. NOTE: it is NOT confirmed that the Salesforce review explicitly
# probes each vector below (see mcpthreat-review-applicability); they are in
# the baseline because (a) the MCP spec makes several of them MUSTs and
# (b) the reviewer pen test will find the exploitable ones regardless.
# ----------------------------------------------------------------------------

- id: mcpthreat-review-applicability
  requirement: Whether the Salesforce review explicitly tests MCP-spec threat vectors (vs. finding them incidentally in pen testing) is unconfirmed.
  details: >
    The official MCP artifact table requires DAST, auth-flow documentation,
    and access-control evidence, but does not name the MCP-spec threat
    vectors. The toolkit audits them anyway: they are spec MUSTs, they have
    produced real CVEs at scale, and an exploitable instance fails the
    reviewer's own pen test whether or not a checklist names it.
  applies_to: [mcp-server]
  automation: manual_only
  automation_notes: Framing note for the audit-codebase mcp-threat-model dimension; nothing to automate.
  severity_if_missing: informational
  sources:
    - url: https://modelcontextprotocol.io/specification/2025-06-18/basic/authorization
      date: "2025-06-18"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-oauth21-pkce
  requirement: Remote MCP servers acting as OAuth resource servers must follow OAuth 2.1 — bearer tokens in the Authorization header only, PKCE for public clients, HTTPS everywhere.
  details: >
    Per the MCP 2025-06-18 authorization spec: tokens never in query strings,
    PKCE per RFC 7636 for public clients, refresh-token rotation for public
    clients, short-lived access tokens, all authorization/redirect endpoints
    HTTPS.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Verify via OAuth metadata (RFC 8414), header-only token acceptance tests, and static review of token issuance code.
  severity_if_missing: major
  sources:
    - url: https://modelcontextprotocol.io/specification/2025-06-18/basic/authorization
      date: "2025-06-18"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-resource-indicators-audience
  requirement: Tokens must be audience-bound (RFC 8707 resource indicators) and the server must validate audience on every request.
  details: >
    Clients pass the server's canonical URI as the resource parameter;
    servers reject tokens whose audience is another service (HTTP 401),
    checking signature, issuer, audience, and expiry before any tool
    invocation — on every request, not just at session start.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Static review of the validation middleware plus live tests injecting wrong-audience tokens and expecting 401.
  severity_if_missing: major
  sources:
    - url: https://modelcontextprotocol.io/specification/2025-06-18/basic/authorization
      date: "2025-06-18"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-token-passthrough-prohibited
  requirement: The MCP server must never forward tokens it received from clients to downstream APIs.
  details: >
    Explicitly prohibited by the 2025-06-18 spec. Passthrough breaks audit
    trails, bypasses downstream controls, and creates confused-deputy
    exposure. The server obtains its own downstream credentials (on-behalf-of
    exchange or service credentials).
  applies_to: [mcp-server]
  automation: partially
  automation_notes: Static analysis catches direct forwarding patterns (received bearer reused in outbound Authorization headers); confirming the replacement-credential design is human review.
  severity_if_missing: major
  sources:
    - url: https://modelcontextprotocol.io/specification/2025-06-18/basic/authorization
      date: "2025-06-18"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-confused-deputy-consent
  requirement: MCP servers that proxy to third-party APIs need per-user, per-client consent tracking with hardened OAuth state handling.
  details: >
    Server-side consent registry keyed on user and client; consent UI showing
    requesting client, scopes, and redirect target; single-use short-lived
    state validated at callback; exact-string redirect URI matching (no
    wildcards); hardened consent cookies.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: Verify registry structures, state handling, and redirect validation in code; consent UX adequacy is human review.
  severity_if_missing: major
  sources:
    - url: https://modelcontextprotocol.io/docs/tutorials/security/security_best_practices
      date: "2025-06-18"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-session-hijacking-stateless-auth
  requirement: No session-cookie authentication — validate the bearer token on every request; any session IDs are non-auth state only.
  details: >
    Session IDs used for stream resumability must be cryptographically
    random, expiring, and bound to user context — and never substitute for
    token validation on each request/poll.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Static review of the auth middleware path plus replay tests with captured session identifiers.
  severity_if_missing: major
  sources:
    - url: https://modelcontextprotocol.io/docs/tutorials/security/security_best_practices
      date: "2025-06-18"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-ssrf-mitigation
  requirement: Any URL the server (or its client components) fetches must be validated — block private/reserved IP ranges and unvalidated redirects.
  details: >
    Applies to OAuth metadata URLs, webhook targets, and any user-influenced
    fetch. Block RFC 1918/loopback/link-local/IPv6-private ranges, validate
    redirect destinations, prefer vetted libraries over hand-rolled IP
    checks, consider an egress proxy. The highest-CVSS MCP CVE of the
    2025-26 wave was an unsanitized-URL remote code execution.
  applies_to: [mcp-server, external-endpoint]
  automation: fully
  automation_notes: Static review of URL-handling code plus live SSRF payload probes against URL-accepting inputs.
  severity_if_missing: major
  sources:
    - url: https://modelcontextprotocol.io/docs/tutorials/security/security_best_practices
      date: "2025-06-18"
      kind: official
    - url: https://jfrog.com/blog/2025-6514-critical-mcp-remote-rce-vulnerability/
      date: "2026-02"
      kind: community
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-prompt-injection-tool-poisoning
  requirement: Tool descriptions and tool outputs are injection surfaces — scan descriptions for hidden instructions and treat retrieved data as untrusted.
  details: >
    Tool descriptions are LLM-visible and can smuggle directives; data the
    tools return (CRM records, emails) can carry instructions that redirect
    the agent ("line-jumping"). Defenses: description integrity checks,
    suspicious-pattern scanning (hidden Unicode, instruction-shaped markup),
    version pinning, and separating untrusted data from instructions in any
    prompt assembly the server performs.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: Pattern/entropy scanning of tool descriptions is automatable; whether a description honestly matches tool behavior requires human plus execution testing.
  severity_if_missing: major
  sources:
    - url: https://invariantlabs.ai/blog/mcp-security-notification-tool-poisoning-attacks
      date: "2026-01"
      kind: community
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_agentforce_prompt_injection_enclosure.htm
      date: unknown
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-scope-minimization
  requirement: Request and expose minimal OAuth scopes — no wildcard/omnibus scopes; separate read from write.
  details: >
    Baseline scopes for read operations, incremental elevation for sensitive
    operations, acceptance of down-scoped tokens. A read/propose/admin tool
    tiering with a scope floor (write tools refuse read-only tokens) is a
    field-tested pattern that also makes the access-control artifact easy to
    write.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Inspect scope declarations and per-tool scope checks; verify wildcard absence; test write tools with read-scoped tokens.
  severity_if_missing: minor
  sources:
    - url: https://modelcontextprotocol.io/docs/tutorials/security/security_best_practices
      date: "2025-06-18"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-rate-limiting-hitl-writes
  requirement: Rate-limit per tool and per caller at agent speeds, and require human confirmation for expensive or state-changing operations.
  details: >
    Agents issue calls orders of magnitude faster than humans; human-tuned
    global limits do not protect expensive tools. Per-tool, per-caller limits
    plus human-in-the-loop on writes, with all invocations logged for audit.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: Verify limit configuration granularity and invocation logging in code; appropriateness of the limits is human judgment.
  severity_if_missing: minor
  sources:
    - url: https://www.practical-devsecops.com/mcp-security-best-practices/
      date: "2026-03"
      kind: community
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-input-validation-schemas
  requirement: Enforce JSON-schema validation on every tool call; no dynamic query construction from tool parameters.
  details: >
    Validate against the declared input schema, reject malformed input,
    allowlist categorical values, and never concatenate tool parameters into
    SQL/SOQL/shell strings. The Jan-Feb 2026 MCP CVE wave was dominated by
    missing input validation; a large survey found most tested MCP
    implementations vulnerable to path traversal.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Static review of the dispatch path plus fuzzing tool endpoints with malformed payloads.
  severity_if_missing: major
  sources:
    - url: https://www.practical-devsecops.com/mcp-security-best-practices/
      date: "2026-03"
      kind: community
    - url: https://jfrog.com/blog/2025-6514-critical-mcp-remote-rce-vulnerability/
      date: "2026-02"
      kind: community
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-supply-chain
  requirement: Pin, lock, and audit dependencies; monitor the MCP-specific CVE stream.
  details: >
    Version pinning with lock files and checksums, dependency scanning in CI,
    and awareness that MCP tooling itself (client shims, server frameworks)
    has shipped critical CVEs — keep those components current.
  applies_to: [mcp-server]
  automation: fully
  automation_notes: Ecosystem-native audit tools plus lockfile checks; fully automatable.
  severity_if_missing: minor
  sources:
    - url: https://labs.cloudsecurityalliance.org/agentic/agentic-mcp-security-best-practices-v1/
      date: "2025-12"
      kind: community
  verification: web_research_unverified
  last_verified: null

- id: mcpthreat-dcr-or-documented-alternative
  requirement: Support OAuth Dynamic Client Registration or document the alternative client-provisioning mechanism.
  details: >
    Per the MCP spec, authorization servers should support RFC 7591 DCR; if
    not, the documented alternative (pre-registered client IDs, configuration
    UI) must be usable and described in the AuthN/AuthZ flow artifact.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: Probe for a registration endpoint; verify documentation covers the alternative when absent.
  severity_if_missing: minor
  sources:
    - url: https://modelcontextprotocol.io/specification/2025-06-18/basic/authorization
      date: "2025-06-18"
      kind: official
  verification: web_research_unverified
  last_verified: null

# ----------------------------------------------------------------------------
# test-environment — the org and backend environment the reviewer tests in
# ----------------------------------------------------------------------------

- id: testenv-developer-edition-default-settings
  requirement: The review test org is a Developer Edition org with the package installed, default security settings, and no unrelated packages.
  details: >
    Leave org defaults (password policy, timeout, SSL settings) unchanged;
    install only packages relevant to this review. The reviewer needs a
    representative, uncontaminated environment. Official corroboration
    (Summer '26): "For most submissions, you're required to provide a
    Developer Edition org with the version of the solution that you intend
    to distribute installed" — Marketing Cloud apps exempt. The partner-tier
    Trialforce template policy independently requires AT LEAST Salesforce's
    baseline/default security level; only customer admins may weaken
    defaults.
  applies_to: [all]
  automation: partially
  automation_notes: Org settings and installed-package inventory are verifiable via the APIs; provisioning the org is owner-run.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_how_it_works.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "AppExchange Trial Template Policies (community PDF, login-gated)"
      date: unknown
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: testenv-mfa-disabled-for-reviewers
  requirement: MFA/2FA must be disabled on the test org credentials handed to the review team.
  details: >
    Reviewers log in with the provided credentials; an MFA prompt makes the
    environment un-testable and bounces the submission. If org-wide MFA
    enforcement applies, sources report an exemption path via Salesforce
    Support for review orgs — start that early, enforcement has been
    tightening platform-wide.
  applies_to: [all]
  automation: partially
  automation_notes: MFA status is checkable via org settings APIs; the exemption request is a human support case.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/blogs/2023/04/prepare-your-app-to-pass-the-appexchange-security-review
      date: "2023-04"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: testenv-realistic-test-data
  requirement: Seed the test org (and external test tenant) with realistic data covering every entity the solution touches — never real customer data.
  details: >
    Reviewers exercise real user paths; empty or skeletal data hides the
    functionality they are supposed to test. Document the data model and
    seeding approach. No actual customer PII.
  applies_to: [all]
  automation: partially
  automation_notes: Synthetic data generation and load are automatable; representativeness is a human call.
  severity_if_missing: major
  sources:
    - url: https://appnigma.ai/blogs/salesforce-security-review-guide-2026/
      date: "2026"
      kind: community
  verification: web_research_unverified
  last_verified: null

- id: testenv-test-personas-documented
  requirement: Provide test users for each major role/segment with credentials, permission assignments, and documented typical paths.
  details: >
    One user per production-representative role (admin, standard, custom),
    each with login credentials and an explanation of what they can reach.
    This is also what makes the access-control artifact and the two-user
    authorization proof testable.
  applies_to: [all]
  automation: partially
  automation_notes: Permission-set extraction and persona matrix generation are automatable; persona definitions and path narratives are human-authored.
  severity_if_missing: major
  sources:
    - url: https://noltic.com/stories/how-to-pass-salesforce-appexchange-security-review
      date: "2026"
      kind: community
  verification: web_research_unverified
  last_verified: null

- id: testenv-external-test-instances
  requirement: External backends need an isolated test instance or dedicated test tenant with working credentials, valid for the whole review window — never production.
  details: >
    Web apps, APIs, and third-party services integrated by the solution need
    reviewer-accessible test environments. Credentials must keep working for
    the full multi-week review (no short-lived trial accounts, no production
    credentials, no debug mode). Corroborated: the official required-
    materials matrix demands "URLs and login credentials for external
    components requiring authentication" for external/mobile/API-only
    architectures, and partner guidance requires a hosted, reviewer-
    accessible instance of any integrated external service.
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: The toolkit validates credential liveness pre-submission and warns about expiry-prone account types; provisioning is owner-run.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/blogs/2023/04/prepare-your-app-to-pass-the-appexchange-security-review
      date: "2023-04"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_required_materials.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner blog: 10 Tips to Passing Security Review (login-gated)"
      date: "2017-01"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — conflict resolved: 120 days (not 12 months) for the
# MCP-path Trialforce-templated Developer Edition review org; the 12-month reading
# came from a different (customer-trial) template context. The general non-MCP
# requirement is a plain Developer Edition org with no stated lifespan.
- id: testenv-trialforce-org-lifespan
  requirement: MCP-path review orgs are Developer Edition orgs created from the program's Trialforce template via the PBO Environment Hub and live 120 days — plan re-provisioning around the review window.
  details: >
    The MCP Client Partner Technical Guide (login-gated) states the 120-day
    lifespan twice and prescribes the creation flow: PBO > Environment Hub >
    Create Org > Test/Demo > enter the Trialforce template id distributed in
    that guide (the id value is login-gated; ask in the partner Slack MCP
    channel or via your Partner Account Manager — it is not reproduced
    here). The Trialforce org is prescribed for the MCP review path (the
    Testing Environment artifact explicitly requires "an isolated testing
    environment (Trialforce Org)"); for most non-MCP submissions the
    official requirement is a plain Developer Edition org with the
    distributable version installed, with no stated lifespan. Operational
    rule: check the org's remaining lifetime against the expected review
    timeline (6-8 weeks total) and re-provision before it expires mid-review,
    which silently produces an un-testable environment.
  applies_to: [all]
  automation: partially
  automation_notes: Org age/expiry is checkable; creation is a guided manual Environment Hub flow.
  severity_if_missing: major
  sources:
    - url: "MCP Client Partner Technical Guide (login-gated)"
      date: "2026-06"
      kind: partner_gated
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_how_it_works.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/free_trial_appexchange_trialforce.htm
      date: unknown
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: testenv-locker-csp-enabled
  requirement: The test org must have the platform's Lightning component security architecture and CSP enforcement enabled (do not relax them for the demo).
  details: >
    Sources phrase this as "Locker Service and CSP enabled" — terminology
    that may be stale, since Lightning Web Security has been replacing Locker
    as the default. The durable rule: do not disable the platform's component
    security or CSP enforcement in the review org to make the app work; an
    app that needs them off will fail. The codified form (Summer '26): new
    reviews AND periodic re-reviews require Lightning components at API
    version 40.0 or higher so Locker is enabled — disabling LockerService is
    itself a named violation (see violation-lockerservice-disabled).
  applies_to: [managed-package]
  automation: fully
  automation_notes: Org security settings are queryable; flag relaxations.
  severity_if_missing: major
  sources:
    - url: https://partners.salesforce.com/s/education/appinnovators/AppExchange_Security_Requirements_Checklist
      date: "2025-2026"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_locker_disabled.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: testenv-agent-testing-center
  requirement: Validate agent/topic/utterance routing with the platform's agent testing tooling before submission.
  details: >
    Batch CSV test templates (utterance, expected topic, expected action)
    run in the Agentforce Testing Center (sandbox-context tooling); Agent
    Preview shows routing reasoning. Run the example-utterance list through
    this before handing it to a reviewer — an utterance that fails to route
    is an un-testable-environment bounce in slow motion.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: The toolkit generates the CSV from the utterance list; upload and execution happen in the org UI.
  severity_if_missing: minor
  sources:
    - url: https://trailhead.salesforce.com/content/learn/modules/agentforce-agent-testing/set-up-testing-criteria
      date: "2025"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: testenv-usage-documentation
  requirement: Provide complete setup and usage documentation — login steps, configuration, critical features, typical user paths — that a reviewer can execute end-to-end without help.
  details: >
    The reviewer follows the documentation literally. Document every login
    (org and external), every prerequisite, and the path to each major
    feature; missing steps read as an un-testable environment. "Solution
    documentation" is a required artifact for ALL six architecture classes
    in the official required-materials matrix.
  applies_to: [all]
  automation: partially
  automation_notes: The toolkit drafts the runbook skeleton from configuration metadata; humans verify each step actually works from a clean seat.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_required_materials.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# Added 2026-06-12 from the primary-source reconciliation.

- id: testenv-trialforce-template-content-policy
  requirement: Trialforce Template orgs offered for trials/review must contain only review-approved package versions, no unpackaged code beyond the standard-pages whitelist, and at-least-baseline security configuration.
  details: >
    From the partner-tier Trial Template Policies (login-gated): every
    package version installed on the template org must already be approved
    through security review (template approval is a separate, downstream
    track); no unpackaged code or components are allowed except an
    enumerated whitelist of ~40 Salesforce-standard Communities/Sites login,
    self-registration, password, profile, and site-template pages with their
    controllers/tests (anything else needs a pre-cleared security review
    case); security configuration must be AT LEAST Salesforce's baseline
    defaults (password policy and session settings enumerated — HTTPS
    enforcement, clickjack protection, CSRF protection on GET and POST stay
    enabled); Trusted IP Ranges kept to a minimum (more than one range
    triggers a Security Review Operations clarification); every scheduled
    job must map to a package-owned class; any Outbound Messages / external
    integrations draw SSROps clarification questions — pre-write the
    explanations. The document is older-era; re-verify numeric defaults
    against current platform defaults before relying on them.
  applies_to: [all]
  automation: partially
  automation_notes: Org-config checks (unpackaged components, trusted IP ranges, scheduled-job ownership, session settings) are queryable via the metadata/tooling APIs; template authoring is owner-run.
  severity_if_missing: major
  sources:
    - url: "AppExchange Trial Template Policies (community PDF, login-gated)"
      date: unknown
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

# ----------------------------------------------------------------------------
# submission-artifacts — the required-artifact table for MCP-server review
# (all 13 rows from the partner-gated official post, paraphrased; cited by
#  name only) plus general documentation artifacts.
# ----------------------------------------------------------------------------

- id: artifact-org-credentials
  requirement: Provide the review org's URL, username, and password.
  details: >
    Working login credentials for the org hosting the solution under review.
    Pairs with testenv-mfa-disabled-for-reviewers — the credentials must log
    in cleanly. Validate them the day of submission.
  applies_to: [mcp-server]
  automation: manual_only
  automation_notes: The toolkit verifies the credentials authenticate and packages them per the wizard's expectations; creating and rotating them is owner-run.
  severity_if_missing: blocker
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: artifact-mcp-server-details
  requirement: Provide the full MCP server endpoint list, the MCP protocol version in use, and URLs plus login credentials for any external component requiring authentication.
  details: >
    A complete inventory of the server's network surface and its negotiated
    protocol version, plus access to every authenticated external component
    so the reviewer can reach the whole architecture.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: Endpoint inventory and protocol version come from the live probe; external-component credentials are owner-provided.
  severity_if_missing: blocker
