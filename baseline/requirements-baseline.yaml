  verification: verified_primary
  last_verified: "2026-06-12"

# Added 2026-06-12 from the primary-source reconciliation (official ISVforce
# Guide Summer '26 pages + partner-gated captures).

- id: process-review-stages
  requirement: The security review runs through four official wizard stages — Prepare & Submit, Submission Verification, Testing, Done — plus Expired as an explicit unofficial fifth stage, with five review statuses (Submitted, Returned, Failed, Passed, Expired).
  details: >
    Stage actors: Security Review Operations runs Submission Verification;
    Product Security runs Testing. Status semantics: Submitted persists
    through verification and testing unless something goes wrong; Returned
    can be set in BOTH Submission Verification (missing materials) and
    Testing (an issue prevents full testing) — both free to resubmit; Testing
    ends Failed (download the report from the wizard Overview page) or
    Passed; Expired applies post-pass when the solution no longer meets
    AppExchange distribution criteria (e.g. unpaid revenue sharing) — the
    listing is removed but the partner can relist. Progress shows on the
    wizard Overview page as a color-coded four-tile tracker (green complete,
    blue current, orange problem, red failure, gray not started). The
    complementary five-step process model (submit, verify, queue, test,
    notify) places a named queue between verification and testing. Outcome is
    binary: Approved / Not Approved.
  applies_to: [all]
  automation: partially
  automation_notes: The toolkit maps wizard status to its readiness tracker and tells the operator what each status requires next; the wizard itself is operator-driven.
  severity_if_missing: informational
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_stages.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_how_it_works.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: process-listing-readiness-inheritance
  requirement: Unreviewed managed-released package versions inherit listing readiness from their direct ancestor; inheritance is evaluated at version-creation time only.
  details: >
    For 1GP the direct ancestor is the latest released version in the same
    branch; for 2GP it is the declared ancestor (highest managed-released
    version). A version created BEFORE its ancestor passes review never
    becomes ready to list retroactively — wait for the pass before creating
    new versions. Beta versions are excluded from the inheritance chain.
    Listing readiness is checked in the Partner Console under Technologies >
    Solutions with exactly two values: "Ready to List" and "Security Review
    Required". Failing a re-review (or letting the remediation period expire)
    causes Security Review Operations to manually delist the package and
    expire its review, stripping readiness from newer inherited versions. A
    listing shows the linked version's number but the last-reviewed
    version/date of the version that actually passed; partners can optionally
    re-submit the listed version (paying applicable review fees) to align
    them.
  applies_to: [managed-package]
  automation: partially
  automation_notes: The toolkit warns when a new package version is created while the ancestor's review is pending, and checks readiness status via the operator.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_listing_readiness.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_check_listing_readiness.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: process-office-hours-two-tracks
  requirement: Two free scheduled office-hours tracks are available via the Partner Security Portal — Security Review Operations (process/logistics) and Product Security engineering (technical) — and office-hours conversations are citable evidence in false-positive responses.
  details: >
    Operations office hours cover submission requirements, scope questions,
    and review logistics; technical office hours cover secure design,
    fixing scanner/review findings, interpreting report findings, and
    adjudicating false positives BEFORE burning a resubmission attempt
    ("What security scan results can I regard as false positives?" is a
    named topic). Salesforce's own example failure-report response cites an
    office-hours conversation by name and date as accepted FP evidence —
    record who/when for every office-hours session. Booking happens in the
    Partner Security Portal (Office Hours section).
  applies_to: [all]
  automation: manual_only
  automation_notes: The toolkit's FP dossier template includes an office-hours citation field (person, date, summary); booking and attending are human steps.
  severity_if_missing: informational
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_schedule_office_hours.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_partner_security_portal_office_hours.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_example_failure_report.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: process-fee-payment-mechanics
  requirement: The review fee is paid through the submission interface at submission time; the payment step repeats on every submission (card re-entered) without double-charging.
  details: >
    Free-distribution solutions pay no fee. The payment step in the Security
    Review Wizard must be completed each time a submission is made — the
    card is re-entered — but partners are not double-charged for free
    resubmission classes (Returned, FP-only on a Failed review). There is no
    expedite path: the review is a time-based process, and the only lever is
    the Partner Account Manager. See process-review-fee for amount and
    per-attempt semantics.
  applies_to: [all]
  automation: manual_only
  automation_notes: Operator step; the toolkit's submission checklist includes the payment step so resubmissions are not stalled by a skipped payment screen.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_how_it_works.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: process-security-program-required
  requirement: A documented security program is a hard pre-listing requirement, and company information security policies are requested submission artifacts (judged with company size/maturity factored in).
  details: >
    Verbatim bar: "Before you list your solution on AppExchange, you must
    have a security program that demonstrates your company's commitment to
    security." The official page enumerates 12 program elements the program
    should produce: a designated security expert; a documented security
    policy; a list of services/artifacts; a third-party library inventory
    WITH versions; architecture diagrams showing data touch points, flows,
    authentication, authorization, and controls; certifications (HIPAA, PCI
    DSS, SOC 2, ISO27001) where applicable; a third-party audit;
    security-assurance docs (SDLC, vulnerability management, remediation
    SLAs, supplier security, awareness training, breach response); a
    sensitive-data list; data storage locations and providers; third-party
    data sharing disclosure; and support/security contact info. The
    required-materials page separately requests "detailed solution user
    documentation and your company's information security policies",
    explicitly factoring in company size and maturity. This documentation
    list is distinct from the submission questionnaire.
  applies_to: [all]
  automation: partially
  automation_notes: The toolkit maps existing partner ISMS/security docs onto the 12 elements and flags gaps; authoring the program is owner work.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_security_policy_requirements.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_required_materials.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

