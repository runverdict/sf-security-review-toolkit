      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: process-partner-program-prerequisites
  requirement: Partner Program enrollment, a connected packaging org, a provider profile, and Lightning Ready certification (for new solutions) are prerequisites to submitting anything.
  details: >
    The official readiness prerequisites (Summer '26): secure the solution to
    industry best standards, enroll it in the AppExchange Partner Program,
    certify it Lightning Ready ("All new solutions submitted for security
    review must be Lightning Ready" — a hard gate for new solutions), connect
    the packaging org to the AppExchange Partner Console, and create a
    provider profile. Partner Security Portal access additionally requires a
    Salesforce Partner Community account and a DevHub/packaging Developer
    Edition org connected to the Partner Console; the Source Code Scanner
    requires the Author Apex permission. Program tiers, listing fees, and
    revenue-share terms live in login-gated program docs — ask your Partner
    Account Manager.
  applies_to: [all]
  automation: manual_only
  automation_notes: The scope-detection phase asks the operator to confirm these gates before generating artifacts; it cannot verify them programmatically.
  severity_if_missing: blocker
  sources:
    - url: https://trailhead.salesforce.com/content/learn/modules/isv_security_review/isv_security_review_submit
      date: "2025"
      kind: official
