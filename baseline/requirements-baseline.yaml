- id: post-oauth-legacy-flow-retirements
  requirement: Track platform OAuth/client-app retirements that can break a listed integration between reviews — new Connected Apps can no longer be created as of Spring '26 (ECAs are the forward path).
  details: >
    Verified example (partner news, 2026-04): "New Connected Apps Can No
    Longer Be Created in Spring '26" — any new OAuth client surface (Canvas,
    MCP OAuth, API integration) must be built as an External Client App.
    Earlier example: the OAuth username-password flow retirement. The
    stay-listed checklist includes a release-notes sweep for auth-affecting
    platform changes each cycle, plus the partner-news feed — mandatory
    mid-cycle controls have shipped with ~2 weeks' notice (see
    post-pkce-refresh-rotation-mandate).
  applies_to: [all]
  automation: partially
  automation_notes: The toolkit flags use of deprecated flows in the codebase; tracking announcements is a recurring human/agent task.
  severity_if_missing: minor
  sources:
