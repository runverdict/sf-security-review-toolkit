- id: scan-no-clean-scan-required
  requirement: Scanner reports do not need to be 100% clean; unfixed findings need documented justification.
  details: >
    Consistent across sources for both SAST and DAST: the reviewer expectation
    is "fix all violations you can fix", re-scan, and submit the final report
    together with per-finding false-positive documentation for the remainder.
    Submitting a report with undocumented findings is the failure mode, not
    the findings themselves. Byte-verified Tip (Summer '26): "it's not
    necessary for the scans to be 100% passing. The main requirement is that
    you run the scans, address all the violations you can fix, re-run the
    scans, and then submit the report."
  applies_to: [all]
  automation: partially
  automation_notes: The toolkit tracks fixed-vs-documented status per finding in the audit ledger and refuses to mark the scan row complete while any finding has neither disposition.
  severity_if_missing: major
