  last_verified: null

- id: dast-salesforce-runs-own-pentest
  requirement: Salesforce's Product Security team performs its own penetration testing regardless of submitted scan evidence.
  details: >
    Partner-submitted DAST does not replace the reviewer's manual and
    automated testing across the entire attack surface (org, package,
    external endpoints, dependent backends, MCP endpoints). Official wording
    (Summer '26): "we can perform pen tests that attack your Developer
    Edition test org and attempt to access sensitive data or authenticate
    with false credentials"; scope follows the data ("Wherever the customer
    or data goes is in scope"). This is why the toolkit's readiness verdict
    must never claim a submission "will pass" — it can only verify the
    partner found everything the partner could find first.
  applies_to: [all]
  automation: manual_only
  automation_notes: Informational; encoded in the honesty guardrails of every readiness verdict.
  severity_if_missing: informational
  sources:
