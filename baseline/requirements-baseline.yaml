  last_verified: "2026-06-12"

# 2026-06-12: corrected — supersedes the attestation framing: after a pass, new
# package versions need NO re-review and no auto-approval submission; the partner
# associates the updated version to the listing, and unreviewed managed-released
# versions inherit readiness from their direct ancestor.
- id: post-version-attestation
  requirement: After a pass, new package versions do not require re-review — associate the updated version to the listing; unreviewed managed-released versions inherit readiness from their direct ancestor.
  details: >
    Partner-tier FAQ: security review submissions are no longer required for
    updated package versions after a package passes a manual review — "simply
    associate the updated version to the listing. Auto-approval submissions
    are no longer needed." The official mechanism is listing-readiness
    inheritance (see process-listing-readiness-inheritance): unreviewed
    managed-released versions inherit from the direct ancestor, evaluated at
    version-creation time; betas are excluded. Patch versions are submittable
    but discouraged — security review inheritance is limited for patches, so
    submit major/minor versions only. If a new version does not show as
    security-approved, log a case via the Partner Community. Re-reviews can
    still be triggered at Salesforce's discretion (post-periodic-rereview),
    so security-relevant changes between versions remain the partner's risk
    to manage.
  applies_to: [all]
  automation: partially
  automation_notes: The toolkit diffs versions and flags security-relevant change classes (new endpoints, auth changes, new data flows) before the human associates a new version.
  severity_if_missing: major
  sources:
