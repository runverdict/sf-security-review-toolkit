- id: process-extension-packages
  requirement: Extension packages undergo the same full security review as standalone solutions, with the complete solution installed in the submitted test org.
  details: >
    Same materials, same fee structure, same timeline. The submitted
    Developer Edition org must contain the COMPLETE solution: the extension
    package plus all base and dependent packages, whether or not the base
    solutions already passed review. If the base solutions have not passed,
    submit them together with the extension. Extension packages with external
    callouts must attach separate web-scan results for the callout-bearing
    packages. Lightning code in extension packages faces additional Content
    Security Policy restrictions.
  applies_to: [managed-package]
  automation: manual_only
  automation_notes: No special handling; the scope manifest treats an extension package as a managed package.
  severity_if_missing: informational
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_extension_package.htm
      date: "2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_required_materials.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: process-soc2-informational
  requirement: SOC 2 / ISO 27001 certifications are informational supporting evidence, never a review gate.
  details: >
    Consistent across every source surveyed: the questionnaire asks about
    audit reports and security programs, and certifications strengthen a
    submission, but no certification is required to pass. The review itself
    (scans plus Salesforce's own penetration test) is the mandatory
    assessment. Do not let a partner block their submission on a compliance
    program. Corroborated Summer '26: the official security-program page
    lists certifications (HIPAA, PCI DSS, SOC 2, ISO27001) as program
    elements "where applicable", and the required-materials page says company
    size and maturity are factored in when reviewing submitted documents.
  applies_to: [all]
  automation: manual_only
  automation_notes: The toolkit notes certification status in the questionnaire pre-fill if the partner provides it; it never requires one.
  severity_if_missing: informational
  sources:
    - url: https://appexchange.salesforce.com/image_host/be70d0b9-ae52-466c-93cb-eaf52ca03092.pdf
      date: "2025-04"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_create_secure_solution.htm
      date: "effective 2023-08-09; Summer '26 (doc v262.0)"
