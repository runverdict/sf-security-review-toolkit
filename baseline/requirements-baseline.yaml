# Added 2026-06-12: the official FP Documentation template's body was captured
# (login-gated Google Doc) — its field structure is now verified. The toolkit's
# fp-dossier template mirrors it.
- id: artifact-fp-documentation-format
  requirement: The official False Positive Documentation template prescribes a specific field structure — mirror it per finding; a wrong FP format wastes a review cycle.
  details: >
    The official template (login-gated Google Doc, linked from the official
    document-responses page) prescribes a document header — Name of the
    Application; Package ID / Version ID / Listing ID; Partner Name;
    Document Filing Date (YYYY-MM-DD); Target URL (optional); Review Date
    (when the solution already underwent review) — and one repeated block
    per vulnerability: Vulnerability Name; a reviewer-reserved section
    ("Meant for the Internal Salesforce Security Team": Final Comment, Date
    of Review, Result — leave blank for the reviewer); Detected By (a
    scanner checklist: the hosted/portal scanner, PMD, the security review
    itself, or Others with details — the checklist still names a retired
    scanner; read it as "the tool that flagged it"); Detailed explanation
    for considering False Positive (elaborate as much as possible);
    Evidence (screenshots of the code, implementation, command output);
    References. The worked examples set the evidence bar: a CRUD-violation
    FP is argued by naming the gating helper class and the permission-check
    call invoked BEFORE the flagged DML, with BOTH the call site and the
    helper implementation excerpted as evidence; a without-sharing
    Sharing-Violation FP is argued as an explicit documented business
    requirement (an install handler that must run for every user), with the
    class declaration excerpted. Format remains officially flexible ("use
    whatever format suits..."), but mirroring the official field structure
    removes reviewer friction and avoids the format bounce; the toolkit's
    fp-dossier template mirrors it and carries its supplementary value-add
    fields in a clearly separated section.
  applies_to: [all]
  automation: partially
  automation_notes: The fp-dossier template mirrors the field structure and the toolkit pre-fills it from scanner output plus code reading; the per-finding explanation and evidence are owner-confirmed (an agent cannot certify non-exploitability).
  severity_if_missing: major
  sources:
    - url: "official False Positive Documentation template (login-gated)"
      date: "undated; captured 2026-06"
      kind: partner_gated
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_document_responses.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — partially superseded: the Checkmarx bar IS published
# (all severities require attention except "Code Quality"); only Code Analyzer
# remains threshold-free (effort-based bar).
- id: scan-severity-threshold-unpublished
  requirement: Code Analyzer has no numeric pass threshold (the bar is effort-based); the Checkmarx bar IS published — all findings require attention except those labeled "Code Quality".
  details: >
    For Code Analyzer, Salesforce publishes no must-pass threshold — the
    official bar is "run the scans, address all the violations you can fix,
    re-run the scans, and then submit the report"; the default CLI exit-code
    threshold differs from review expectations, so do not use exit codes as a
    readiness signal. For the Source Code Scanner (Checkmarx), the official
    severity table requires attention (fix or justified false-positive
    documentation) for ALL issues regardless of severity level that aren't
    labeled "Code Quality"; "Code Quality"-labeled issues require none.
    General rule verbatim: "If you can't submit justifiable false positive
    documentation, rework the flagged code to meet security standards." The
    DAST companion bar lives in dast-severity-bar.
  applies_to: [managed-package]
  automation: fully
  automation_notes: The toolkit ranks by severity and gates its own readiness verdict on zero undispositioned findings outside Checkmarx's Code Quality label.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/docs/platform/salesforce-code-analyzer/guide/appexchange.html
      date: "2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_document_responses.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: scan-external-sast
  requirement: The partner-hosted external endpoint's source (Python/Node/Java/Go) should pass a mechanical SAST scan before submission, to pre-empt the reviewer's penetration test of that surface.
  details: >
    Salesforce Code Analyzer scans only the Salesforce-package surface
    (Apex/VF/Aura); it never sees the external server, but Salesforce explicitly
    pen-tests it (the "Test Your Entire Solution" guidance: include all external
    endpoints, follow-the-data, run automated scanning tools). The toolkit
    recommends a free/OSS SAST pass over every detected non-package source root —
    Semgrep (multi-language keystone) plus a language gate (Bandit/njsscan/gosec) —
    so injection / auth-bypass / SSRF classes are fixed before the reviewer's pen
    test reaches them. This is a toolkit recommendation that reduces bounce risk,
    NOT a Salesforce-mandated submission artifact; the specific tool choice is the
    toolkit's. A confirmed critical in reviewer-reachable server code is a fix-now
    blocker; a missing scan is a major materials gap.
  applies_to: [external-endpoint]
  automation: fully
  automation_notes: run-scans Family 7 runs Semgrep + the language gate over each detected source root, emits evidence, and folds findings into the dossier + the audit ledger.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-15"

- id: scan-external-sca
  requirement: Third-party dependencies of the external endpoint must be free of known CVEs, evidenced by a mechanical SCA scan of every lockfile under a non-package source root.
  details: >
    The companion server's dependency tree is in scope the same way the package's
    bundled libraries are (baseline scan-dependency-vulnerabilities), but Code
    Analyzer's RetireJS only covers packaged JS. The toolkit recommends OSV-Scanner
    (multi-ecosystem, OSV DB; leaner than per-ecosystem npm/pip audit) over every
    external lockfile, with upgrade targets. Reuse the OSV output as the SBOM /
    component-version table for the security-program element-4 slot.
  applies_to: [external-endpoint]
  automation: fully
  automation_notes: run-scans Family 8 runs OSV-Scanner over each external lockfile.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-15"

- id: scan-iac-misconfig
  requirement: Infrastructure-as-code shipped with the external endpoint (Dockerfile, Terraform, CloudFormation, Kubernetes) should pass a misconfiguration scan before submission.
  details: >
    A secret in a Dockerfile, a security group open to 0.0.0.0/0, or a public-read
    bucket is part of the attack surface the reviewer's pen test reaches by
    following the data. The toolkit recommends Checkov (or Trivy) over every
    Dockerfile / IaC file. A hardcoded secret found here is ALSO a Family-6
    fail-hardcoded-secrets hit — cross-reference, do not double-disposition.
  applies_to: [external-endpoint]
  automation: fully
  automation_notes: run-scans Family 8 runs Checkov over the IaC dir + each Dockerfile.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-15"

- id: scan-dependency-vulnerabilities
  requirement: All bundled third-party libraries and dependencies must be free of known CVEs.
  details: >
    Outdated JavaScript libraries (jQuery and friends) with known CVEs are a
    recurring failure cause. Code Analyzer's RetireJS engine covers JS in the
    package; for non-platform components use the ecosystem-native scanner
    (npm audit, pip-audit, etc.). Upgrade to patched versions rather than
    documenting around a known CVE. Codified bar (Summer '26): the violation
    is using software with CVE-documented vulnerabilities "related to your
    use cases" (not a numeric CVSS threshold), and patches must be tested and
    deployed as soon as available. CVEs genuinely unrelated to your use cases
    are FP-documentable — the review team uses that documentation when
    deciding whether to approve the vulnerable software.
  applies_to: [all]
  automation: fully
  automation_notes: Fully automatable per ecosystem; the toolkit emits a dependency report with upgrade targets and flags breaking-change risk.
  severity_if_missing: major
  sources:
