      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: scan-apex-test-coverage
  requirement: Apex code needs minimum 75% test coverage with zero test failures for the package to be promotable at all.
  details: >
    A packaging gate rather than a review gate, but it blocks the submission
    pipeline upstream: an unpromoted (beta) package version cannot be
    submitted. Coverage is measured at package level; all triggers need
    coverage; all tests must pass.
  applies_to: [managed-package]
  automation: fully
  automation_notes: Run the Apex test suite via sf CLI, parse coverage, gate the preflight on >=75% and zero failures.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.pkg2_dev.meta/pkg2_dev/sfdx_dev_dev2gp_code_coverage.htm
      date: "2024-2025"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: scan-report-freshness
  requirement: Scan reports should be fresh at submission time; the exact validity window is not codified.
  details: >
    Sources reference a ~30-day expectation for pen-test-style reports and
    "scan immediately before submitting" as best practice, but no official
    30/60/90-day policy was found. The toolkit's safe behavior: re-run cheap
    scans (Code Analyzer, SSL Labs, dependency audit) at compile-submission
    time and flag any owner-run report older than 30 days for refresh.
  applies_to: [all]
  automation: fully
  automation_notes: Extract scan dates from reports, compare to submission date, warn at 30 days.
  severity_if_missing: minor
  sources:
    - url: https://appnigma.ai/blogs/salesforce-security-review-guide-2026/
      date: "2026"
      kind: community
  verification: web_research_unverified
  last_verified: null

# ----------------------------------------------------------------------------
# external-endpoint — TLS, web-app security bar, platform-boundary rules
# ----------------------------------------------------------------------------

# 2026-06-12: corrected — supersedes the "A grade is a hard gate" framing: the
# codified official requirement is QUALITATIVE (HTTPS-only, secure TLS, no weak
# ciphers, long keys, HTTP-to-HTTPS redirect, HSTS); the official 2023 blog says
# TLS 1.2 minimum and "aim for an A" (guidance wording); "A+" appears nowhere
# official. Letter-grade-as-reviewer-practice remains the one open question.
- id: endpoint-ssl-labs-a-grade
  requirement: External endpoints must meet the codified qualitative transport bar (HTTPS-only, secure TLS versions, weak ciphers disabled, long keys, HTTP-to-HTTPS redirect, HSTS); official guidance additionally recommends targeting a Qualys SSL Labs A grade with TLS 1.2 minimum.
  details: >
    The codified guide-level gate (the Secure Communication violation,
    Summer '26) is qualitative: reachable exclusively over HTTPS/SFTP,
    "use secure versions of TLS, disable weak ciphers, generate long keys",
    redirect incoming HTTP to HTTPS, and use HSTS; plain-HTTP endpoints are
    an outright violation. The official Top-20 blog (2023-08) adds TLS 1.2
    minimum for all incoming/outgoing connections and "run the Qualys SSL
    scanner ... aim for an 'A' grade" — target/guidance wording, not
    pass/fail language; "A+" appears in no official source. The toolkit
    still targets A as the practical bar (evidence: the SSL Labs result per
    endpoint base URL — report/screenshot showing URL, grade, scan date)
    because exceeding the qualitative gate is cheap and removes reviewer
    discretion, but it recommends the grade rather than asserting it as a
    codified requirement.
  applies_to: [external-endpoint, mcp-server]
  automation: fully
  automation_notes: Query the SSL Labs API per endpoint, store the JSON as evidence, capture a screenshot, flag anything below A with the failing cipher/protocol details.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/blogs/2023/04/prepare-your-app-to-pass-the-appexchange-security-review
      date: "2023-04"
      kind: official
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_communication.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: conflicting
  last_verified: "2026-06-12"
  conflicts: >
    One narrow question remains: whether reviewers in PRACTICE enforce an SSL
    Labs letter grade (A) as a pass/fail gate on external endpoints, beyond
    the codified qualitative requirements. The official wording is "aim for"
    (guidance); 2026 community guides still describe a hard A gate; no
    primary source settles reviewer practice. Treat A as the recommended
    target and confirm with your Partner Account Manager / office hours if an
    endpoint cannot reach A.

- id: endpoint-https-only
  requirement: All connections to and from the platform must be HTTPS; plain HTTP for data transfer is prohibited.
  details: >
    Applies to every external endpoint, web service, callback, and resource
    load. Hardcoded http:// URLs in callout code, Remote Site Settings, or
    OAuth callbacks are findings. Codified as the named Secure Communication
    violation (HTTPS/SFTP only; HTTP and FTP disallowed) and ranked #17
    (Insecure endpoint) in the official Top-20 failure causes.
  applies_to: [external-endpoint, mcp-server, canvas]
  automation: fully
  automation_notes: Grep/AST scan for http:// in callouts and config, plus live tests for HTTP fallback and redirect behavior.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/04/prepare-your-app-to-pass-the-appexchange-security-review
      date: "2023-04"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_communication.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: endpoint-trusted-ca-certificates
  requirement: External endpoints must present certificates from well-known trusted root CAs with a complete chain; self-signed certificates are not accepted.
  details: >
    Trust anchors are the well-known root stores (Mozilla root store, Federal
    PKI per the help article). The chain must include all intermediates.
    Expired, self-signed, or private-CA certificates fail.
  applies_to: [external-endpoint, mcp-server]
  automation: fully
  automation_notes: Certificate chain validation is part of the SSL Labs evidence pass; the toolkit additionally checks expiry headroom.
  severity_if_missing: major
  sources:
    - url: https://help.salesforce.com/s/articleView?id=000385468&language=en_US&type=1
      date: "2025"
      kind: official
  verification: web_research_unverified
  last_verified: null

# 2026-06-12: corrected — upgraded from "should" to codified: the Secure
# Communication violation page requires HSTS ("To prevent man-in-the-middle
# downgrade attacks, use HTTP strict transport security (HSTS)"). Severity raised
# minor -> major accordingly.
- id: endpoint-hsts
  requirement: External endpoints must send an HTTP Strict Transport Security header — codified in the Secure Communication violation.
  details: >
    The Summer '26 guide's Secure Communication violation page requires HSTS
    to prevent man-in-the-middle downgrade attacks, alongside HTTP-to-HTTPS
    redirects. Expected shape: max-age of at least one year;
    includeSubDomains where the domain layout permits. Also aligns with
    platform practice (HSTS enforced across Salesforce domains).
  applies_to: [external-endpoint, mcp-server]
  automation: fully
  automation_notes: Header inspection on live endpoints; fully automatable.
  severity_if_missing: major
  sources:
    - url: https://help.salesforce.com/s/articleView?id=release-notes.rn_security_domains_hsts_preloading.htm&language=en_US&release=232&type=5
      date: unknown
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_communication.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: endpoint-secure-cookies
  requirement: Session cookies on external endpoints must carry Secure and HttpOnly flags and never transit HTTP.
  details: >
    Reviewers check Set-Cookie directives on authenticated surfaces. Missing
    Secure/HttpOnly on a session cookie is a standard finding.
  applies_to: [external-endpoint]
  automation: fully
  automation_notes: Inspect Set-Cookie headers across the authenticated surface; fully automatable.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/04/prepare-your-app-to-pass-the-appexchange-security-review
      date: "2023-04"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: endpoint-csrf-protection
  requirement: All state-changing operations need CSRF protection.
  details: >
    POST/PUT/DELETE on external endpoints require anti-CSRF tokens (or an
    architecture that is inherently immune, e.g. pure bearer-token APIs with
    no cookie-based session — document that reasoning in the FP dossier
    rather than leaving a DAST CSRF finding undispositioned). On-platform:
    do not circumvent the built-in anti-CSRF protections; no state-changing
    actions on page load via GET. Codified on-platform as the named CSRF
    violation (see violation-csrf-page-instantiation); for non-Salesforce
    APIs the official Top-20 blog prescribes custom CSRF tokens.
  applies_to: [external-endpoint, managed-package]
  automation: partially
  automation_notes: DAST exercises CSRF on live endpoints; static scan flags GET-based state changes; architectural immunity claims need human confirmation.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.secure_coding_guide.meta/secure_coding_guide/secure_coding_cross_site_req_forgery.htm
      date: unknown
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_request_forgery.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: endpoint-owasp-top10-bar
  requirement: External web services are assessed against the standard OWASP Top 10 / CWE Top 25 bar, including by Salesforce's own testers.
  details: >
    Injection, broken authentication, sensitive-data exposure, XXE, broken
    access control, misconfiguration, XSS, insecure deserialization,
    vulnerable components, and insufficient logging/monitoring. This is the
    background bar behind the named gates; the audit-codebase dimensions map
    to it. The official Security Review Resources page (Summer '26) lists
    OWASP, the OWASP Top 10, the Web Security Testing Guide, and the OWASP
    Developer Guide as designated preparation materials.
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: DAST plus the audit engine cover the detectable classes; Salesforce's manual penetration test covers the rest regardless of submitted evidence.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_resources.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-20: the deserializer-itself probe behind the OWASP "insecure
# deserialization" line above — no dimension owned object reconstruction from
# untrusted bytes before this. Added with the untrusted-deserialization
# dimension (coverage-gap map P1.2).
- id: untrusted-deserialization
  requirement: Deserializing untrusted bytes into a language object must use plain-data formats only — never a native-object/code-bearing deserializer over attacker-reachable input, and Apex JSON.deserialize into an sObject must strip inaccessible fields before DML.
  details: >
    OWASP A08:2021 (Software and Data Integrity Failures) / CWE-502 — the rare
    class whose default outcome is RCE. Three sinks: (1) native-object
    deserializers execute on reconstruction — Python pickle/marshal/jsonpickle/
    yaml.load-without-SafeLoader, Node node-serialize/funcster unserialize() (the
    _$$ND_FUNC$$_ gadget), Ruby Marshal.load/YAML.load, Java
    ObjectInputStream/XMLDecoder/default-typing Jackson — over a request body,
    a poisonable cache/queue/session, a cookie, or an upload; (2) JavaScript
    prototype pollution — __proto__/constructor keys deep-merged (lodash.merge/
    set, hand-rolled merges) into an object a later property read trusts; (3)
    Apex JSON.deserialize/deserializeUntyped into an sObject, where caller-
    supplied privileged fields (OwnerId/RecordTypeId/status/parent Id) reach
    insert/update/upsert unless Security.stripInaccessible(UPSERTABLE/CREATABLE)
    or a field allowlist runs first. Owned by the untrusted-deserialization
    dimension. The mass-assignment write-authz angle beyond deserialization is
    apex-exposed-surface/mcp-surface; XXE is a scanner rule.
  applies_to: [managed-package, external-endpoint, mcp-server]
  automation: partially
  automation_notes: Deserializer call sites grep loudly (pickle/yaml.load/unserialize/ObjectInputStream/JSON.deserialize/lodash.merge); the judgment — does the input cross a trust boundary, and is the format/sink dangerous — needs the code read in context. The dependency-CVE half (prototype-pollution libs) is cross-checked by the SCA scan.
  severity_if_missing: major
  sources:
    - url: https://owasp.org/Top10/A08_2021-Software_and_Data_Integrity_Failures/
      date: "2021"
      kind: community
    - url: https://cwe.mitre.org/data/definitions/502.html
      date: unknown
      kind: community
  verification: web_research_unverified
  last_verified: null

- id: endpoint-error-hygiene-debug-off
  requirement: External services must run in production mode with generic error pages — no stack traces, paths, schema, or framework debug output.
  details: >
    Reviewers deliberately crash endpoints with malformed input and read the
    error responses. Debug mode left on in the review environment is a
    classic, entirely preventable failure. Logs must not contain plaintext
    credentials or session material. Top-20 #13 (information disclosure on
    error pages) byte-verified 2026-06-12; the named Expose Secret Data When
    Debugging violation codifies the log-content side.
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: Fuzz endpoints and pattern-match responses for stack traces/paths/schema; confirming server-side config (debug flags, log content) needs owner access.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/blogs/2023/04/prepare-your-app-to-pass-the-appexchange-security-review
      date: "2023-04"
      kind: official
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/secure_code_violation_secret_data_debug.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: endpoint-enumeration-brute-force
  requirement: Authentication surfaces must resist username/email enumeration and brute force.
  details: >
    Login errors identical for valid and invalid usernames (content AND
    timing); password reset without plaintext transmission; rate limiting and
    lockout on credential endpoints. Top-20 #18 (enumeration), #19 (password
    management), and #20 (password echo) byte-verified 2026-06-12 — these are
    the named partner-endpoint auth failure causes reviewers test for.
  applies_to: [external-endpoint]
  automation: partially
  automation_notes: Automated probes compare error responses and timing, and check rate-limit headers; reset-flow logic review is manual.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: endpoint-csp-canvas-frame-ancestors
  requirement: Externally hosted surfaces framed inside Salesforce (Canvas) need a Content-Security-Policy whose frame-ancestors is scoped to Salesforce domains.
  details: >
    frame-ancestors restricted to the salesforce.com/force.com family on the
    framed paths only; do not ship a conflicting X-Frame-Options header on
    those paths; every external resource (fonts, images, CSS, scripts) loads
    over HTTPS. Reviewers check the headers on the live Canvas URL.
  applies_to: [canvas]
  automation: fully
  automation_notes: Header inspection plus CSP parsing on the framed paths; fully automatable.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.lightning.meta/lightning/security_csp.htm
      date: unknown
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: endpoint-multi-tenant-isolation
  requirement: Shared external backends must demonstrate tenant isolation — reviewers actively test for cross-tenant access and IDOR.
  details: >
    Reviewers simulate cross-tenant scenarios: object references substituted
    across accounts, list endpoints probed for other tenants' rows. Submittable
    evidence that strengthens a review: a documented two-user bidirectional
    IDOR test proving requests for the other tenant's objects return
    403/404/empty. A field-tested pattern: enforce isolation at the database
    layer (e.g. Postgres row-level security keyed on a per-request tenant
    binding) so an application-layer filter miss does not become a leak, and
    document that as the isolation control. Corroborated by primary sources:
    the official guide states reviewers "can perform pen tests that attack
    your Developer Edition test org and attempt to access sensitive data or
    authenticate with false credentials", the reviewer threat model is an
    authenticated customer-level attacker, and the MCP artifact table demands
    two user accounts so reviewers can verify data is returned only to
    authorized users.
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: The toolkit generates a two-user IDOR proof script from the endpoint inventory; provisioning the two tenants/users is owner-run.
  severity_if_missing: major
  sources:
    - url: https://www.ksolves.com/blog/salesforce/security-review
      date: "2025"
      kind: community
    - url: https://help.salesforce.com/s/articleView?id=sf.c360_a_tenant_specific_endpoint.htm&language=en_US&type=5
      date: unknown
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "MCP Client Partner Technical Guide (login-gated)"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: endpoint-rate-limiting
  requirement: External endpoints should enforce rate limiting; no published numeric thresholds exist.
  details: >
    Expected as part of brute-force and DoS posture; for MCP servers the
    practical bar is higher (see mcpthreat-rate-limiting-hitl-writes) because
    agent callers issue requests far faster than humans.
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: Detect rate-limit responses/headers automatically; appropriateness of limits is a human judgment.
  severity_if_missing: minor
  sources:
    - url: https://developer.salesforce.com/blogs/2023/08/the-top-20-vulnerabilities-found-in-the-appexchange-security-review
      date: "2023-08"
      kind: official
  verification: web_research_unverified
  last_verified: null

- id: endpoint-named-credentials-callouts
  requirement: On-platform callouts to external services should use Named/External Credentials, never hand-rolled credential handling.
  details: >
    Named Credentials (or External Credentials with encrypted principals) are
    the accepted storage for callout auth. Packaged named credentials
    reportedly default to developer-controlled (subscribers cannot edit) as of
    early 2026. API-key parameters belong in the External Credential
    principal, encrypted.
  applies_to: [managed-package]
  automation: partially
  automation_notes: Static scan distinguishes Named Credential callouts from raw HTTP with inline auth; credential lifecycle policy is reviewed by a human.
  severity_if_missing: major
  sources:
    - url: https://help.salesforce.com/s/articleView?language=en_US&id=sf.nc_named_creds_and_ext_creds.htm&type=5
      date: "2026-02"
      kind: official
  verification: web_research_unverified
  last_verified: null

# Added 2026-06-12 from the primary-source reconciliation.

- id: endpoint-third-party-testing-consent
  requirement: Before security-testing external endpoints the partner does not own, the partner must obtain the third-party owner's permission (the partner tier specifies WRITTEN consent permitting Salesforce to test) and follow "Salesforce IP Addresses & Domains to Allow".
  details: >
    Third-party-owned endpoints integrated with the solution are in review
    scope ("test all parts of every offering"), so the review cannot proceed
    against them without owner authorization. Official wording: "obtain any
    necessary permission to perform security testing from the third parties
    that own the external endpoints" plus follow the Salesforce IP/domain
    allow guidelines; the partner-gated overview article tightens this to a
    written consent that permits Salesforce to test the third party's
    endpoint. Collect consent letters during preparation, not at
    submission-verification time.
  applies_to: [external-endpoint, mcp-server]
  automation: manual_only
  automation_notes: The toolkit's scope manifest flags every third-party-owned endpoint and tracks a consent-letter checkbox per endpoint; obtaining consent is a human/legal step.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: endpoint-review-scanner-ip-allowlist
  requirement: External web services in review scope must allowlist Salesforce's security-testing source IPs for the review window — third-party hosting, WAFs, and IP-restricting firewalls can otherwise block the reviewer's scanner.
  details: >
    The partner-gated security-review overview article lists three specific
    scanner source IP addresses to whitelist (the values are in the
    login-gated article — pull them from there or from your Partner Account
    Manager; they are not reproduced here). Endpoints behind CDN proxies,
    cloud firewalls restricting ingress to CDN ranges, rate limiters, or
    geo-blocks need a temporary allowlist exception during the review window,
    or testing fails and the submission bounces as un-testable. Pair with the
    official "Salesforce IP Addresses & Domains to Allow" guidelines.
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: The toolkit reminds the operator to stage the allowlist exception before submission and to remove it after the review completes; firewall changes are owner-run.
  severity_if_missing: blocker
  sources:
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

# ----------------------------------------------------------------------------
# dast — partner-run dynamic testing (post-Chimera)
# ----------------------------------------------------------------------------

# 2026-06-12: enriched — the current official scanners page is BYO-DAST ("any
# Dynamic Application Security Test (DAST) scanner that you prefer", naming ZAP,
# Burp Suite, HCL AppScan, WebInspect) and no longer mentions Chimera at all.
- id: dast-self-run-required
  requirement: Partners must self-run DAST against all external endpoints with any industry tool they prefer (ZAP, Burp Suite, HCL AppScan, WebInspect named) — the hosted scanner is retired.
  details: >
    The Salesforce-hosted Chimera DAST scanner was decommissioned in mid-2025
    (most sources cite June 16, 2025); the current portal scanners page has
    dropped Chimera entirely. DAST is entirely partner-run: "use any Dynamic
    Application Security Test (DAST) scanner that you prefer, such as ZAP,
    Burp Suite, HCL AppScan or WebInspect". Trigger: "If your solution
    connects to any non-Salesforce domains, also run a DAST scan on the
    external endpoints" and include the reports with the submission. The
    partner-gated MCP guidance confirms the tool is the partner's choice.
    There is no Salesforce-hosted alternative.
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: >
    The toolkit generates the scan plan and authenticated ZAP configuration
    from the endpoint inventory, and parses the resulting report; executing
    the scan against live infrastructure is owner-run (authorization to scan,
    credentials, infrastructure access).
  severity_if_missing: blocker
  sources:
    - url: https://partners.salesforce.com/pdx/s/pcnews/salesforce-is-decommissioning-the-chimera-dast-scanner-for-security-review-proce-MCSW5GDRJIPJAY3PLOICAWZUGNVM?language=en_US
      date: "2025-05-13"
      kind: official
    - url: https://help.salesforce.com/s/articleView?id=release-notes.rn_appexchange_chimera_sunset.htm&language=en_US&release=256&type=5
      date: "2025-06"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_partner_security_portal_scanners.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "MCP Client Partner Technical Guide (login-gated)"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

- id: dast-authenticated-scans
  requirement: DAST scans must be authenticated — drive the scanner through the login/OAuth flow, not just the anonymous surface.
  details: >
    Unauthenticated scans miss the authorization-flaw classes the review
    cares most about. The scanner must hold a valid session/token while
    crawling protected endpoints. For OAuth-protected APIs this means a
    scanner context that acquires and refreshes tokens. The official
    methodology (Summer '26): route API-client/browser traffic through the
    DAST proxy, exercise the relevant endpoints so the tool discovers the
    full attack surface, run an active scan, then manually intercept, modify,
    or fuzz requests for deeper testing — automated scans alone are
    insufficient (stated at the partner tier too).
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: The toolkit emits a ZAP authentication context (token acquisition + header injection) from the documented auth flow; test credentials come from the owner.
  severity_if_missing: blocker
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_prepare.htm
      date: "2025"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "partner security-review overview article (login-gated)"
      date: "2026-06"
      kind: partner_gated
    - url: https://appnigma.ai/blogs/salesforce-security-review-guide-2026/
      date: "2026"
      kind: community
  verification: verified_primary
  last_verified: "2026-06-12"

- id: dast-scope-includes-identity-endpoints
  requirement: For MCP submissions, DAST scope must include both the MCP endpoints AND the identity (OAuth authorization/token) endpoints.
  details: >
    Scanning the API surface while omitting the authorization server that
    protects it produces an out-of-scope-incomplete report. If the solution
    runs its own OAuth authorization server, the authorize/token/registration
    endpoints are in scope as first-class targets — driving the scanner
    THROUGH the login flow is not the same as scanning the identity surface
    itself.
  applies_to: [mcp-server]
  automation: partially
  automation_notes: The toolkit's generated scan scope always includes the OAuth metadata-discovered endpoints alongside the MCP paths; the owner runs the scan.
  severity_if_missing: blocker
  sources:
    - url: "partner Slack security-review post"
      date: "2026-06"
      kind: partner_gated
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — conflict resolved by the official severity table:
# critical+high require attention (fix or documented false positive); low/medium
# require NO action, only encouraged investigation. Supersedes the CVSS>=7,
# "clean report", and "document medium/low" readings.
- id: dast-severity-bar
  requirement: Critical and high-severity DAST findings require attention (fix or justified false-positive documentation); action on low and medium severity findings is not required — only investigation is encouraged.
  details: >
    Official severity table (Summer '26), ZAP/Burp/"any other DAST scanner"
    row — requiring attention: "Issues categorized as critical and
    high-severity"; not requiring attention: "Action on low and medium
    severity issues isn't required, but investigation into whether they pose
    a security threat is encouraged." Companion Checkmarx bar on the same
    page: ALL severities require attention except findings labeled "Code
    Quality". General rule: "If you can't submit justifiable false positive
    documentation, rework the flagged code." The toolkit's posture stays
    stricter than the bar (a disposition for every finding) because
    undocumented low/medium noise still invites reviewer questions.
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: Parse the report, force a disposition per finding, hard-gate readiness on zero undispositioned critical/high findings.
  severity_if_missing: major
  sources:
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_document_responses.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
    - url: "MCP Client Partner Technical Guide (login-gated)"
      date: "2026-06"
      kind: partner_gated
    - url: https://noltic.com/stories/how-to-pass-salesforce-appexchange-security-review
      date: "2026"
      kind: community
  verification: verified_primary
  last_verified: "2026-06-12"

# 2026-06-12: corrected — the codified form of this requirement is the exported
# report contents: "Export a full report after the scan, including the scan date,
# targeted endpoints, and all findings" (screenshots are one way to evidence it).
- id: dast-screenshot-proof-of-scanned-url
  requirement: The exported DAST report must include the scan date, the targeted endpoints, and all findings — proving the stated endpoints were actually scanned.
  details: >
    Official wording (Summer '26): "Export a full report after the scan,
    including the scan date, targeted endpoints, and all findings." The
    reviewer needs to confirm the report corresponds to the endpoints in the
    architecture doc. Capture report pages/screenshots that visibly show the
    target URL and the scan date.
  applies_to: [external-endpoint, mcp-server]
  automation: fully
  automation_notes: Extract the scanned-URL evidence from the report and auto-generate the screenshot artifact alongside it.
  severity_if_missing: major
  sources:
    - url: https://trailhead.salesforce.com/content/learn/modules/isv_security_review/isv_security_review_prepare
      date: "2026"
      kind: official
    - url: https://developer.salesforce.com/docs/atlas.en-us.packagingGuide.meta/packagingGuide/security_review_test_all.htm
      date: "Summer '26 (doc v262.0)"
      kind: official
  verification: verified_primary
  last_verified: "2026-06-12"

- id: dast-endpoints-production-mode
  requirement: Endpoints under DAST (and reviewer pen test) must be in a production-equivalent state — not debug mode.
  details: >
    A staging endpoint left in debug mode leaks stack traces and schema when
    the reviewer crashes it (and they will try). The scan target should match
    production hardening: debug off, generic errors, production logging
    config.
  applies_to: [external-endpoint, mcp-server]
  automation: partially
  automation_notes: Automated probes detect debug indicators (verbose errors, debug headers); confirming server config is owner-run.
  severity_if_missing: major
