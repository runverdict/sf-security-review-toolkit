# LDAP injection (CWE-90) — Go. Toolkit-authored Semgrep taint rule.
#
# Why this rule exists: the OSS packs cover Java + C# LDAP injection, but no OSS rule
# covers Go LDAP — a Go partner using go-ldap and building the filter from HTTP input
# gets no finding. CodeQL covers it but its license bars use on proprietary partner
# code. This rule closes that gap, run via `--config`.
#
# Scope (honest): Semgrep CE taint is INTRA-FILE / intraprocedural — LOW-FP (a real
# source→sink flow is required) but MODERATE-FN (a cross-function flow into the
# filter falls to the LLM residual, not to a noisy bare-sink rule).
#
# Low-FP construction: both sinks are package-qualified to go-ldap (`ldap.NewSearchRequest`
# and the `ldap.SearchRequest{Filter: ...}` struct literal), so a partner-defined helper
# that merely shares the name `NewSearchRequest` does not fire. (A dot-import of go-ldap
# is the FN trade — it is rare and discouraged in Go, and falls to the LLM residual.)
rules:
  - id: go-ldap-injection-taint
    mode: taint
    message: >-
      Untrusted HTTP input flows into an LDAP search filter. Concatenating
      request-controlled data into the filter of an `ldap.NewSearchRequest` /
      `ldap.SearchRequest` allows an attacker to alter the filter structure (LDAP
      injection) and read or bypass directory records. Escape the untrusted value
      with `ldap.EscapeFilter` before building the filter.
    severity: WARNING
    languages: [go]
    metadata:
      cwe:
        - "CWE-90: Improper Neutralization of Special Elements used in an LDAP Query ('LDAP Injection')"
      category: security
      confidence: MEDIUM
      subcategory:
        - vuln
      technology:
        - go
        - ldap
      references:
        - https://cwe.mitre.org/data/definitions/90.html
        - https://owasp.org/www-community/attacks/LDAP_Injection
    pattern-sources:
      # net/http request accessors — the receiver is typed to *http.Request so a
      # same-named `FormValue` / `.URL.Query()` on a config/DTO struct does not match.
      - patterns:
          - pattern-either:
              - pattern: $R.FormValue(...)
              - pattern: $R.PostFormValue(...)
              - pattern: $R.URL.Query()
          - metavariable-type:
              metavariable: $R
              types:
                - "*http.Request"
      - pattern: mux.Vars($R)
    pattern-sanitizers:
      - pattern: ldap.EscapeFilter(...)
      # A value coerced to a number cannot carry LDAP filter metacharacters.
      - pattern-either:
          - pattern: strconv.Atoi(...)
          - pattern: strconv.ParseInt(...)
          - pattern: strconv.ParseUint(...)
          - pattern: strconv.ParseFloat(...)
    pattern-sinks:
      # go-ldap — ldap.NewSearchRequest(BaseDN, Scope, DerefAliases, SizeLimit,
      # TimeLimit, TypesOnly, Filter, Attributes, Controls): Filter is arg 7.
      - patterns:
          - pattern: ldap.NewSearchRequest($DN, $SCOPE, $DEREF, $SIZE, $TIME, $TYPES, $FILTER, ...)
          - focus-metavariable: $FILTER
      # go-ldap — the struct-literal form: ldap.SearchRequest{ ..., Filter: FILTER, ... }.
      - patterns:
          - pattern-either:
              - pattern: "ldap.SearchRequest{..., Filter: $FILTER, ...}"
              - pattern: "&ldap.SearchRequest{..., Filter: $FILTER, ...}"
          - focus-metavariable: $FILTER
